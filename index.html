      ai:{name:'SYSTEM',hp:INITIAL_HP,deck:deckA,hand:[],field:{robots:[],batteries:[]},energyUsed:0,bonusEnergy:0,skipTurn:false,peekRevealed:[]},
    },
    turn:'me',
    turnNumber:1,
    log:[],
    selected:null,
    attackMode:false,
    pendingModule:null,
    phase:'main',
    toasts:[],
    gameOver:null,
  };
}

function buildDeck(){
  // Roboter-lastiges Deck: 16 Roboter, 9 Batterien, 5 Module = 30
  const deck = [];
  const cheap = ROBOTS.filter(r=>r.cost<=2);
  const mid = ROBOTS.filter(r=>r.cost===3);
  const big = ROBOTS.filter(r=>r.cost>=4);
  // 7 günstig, 6 mittel, 3 teuer
  for(let i=0;i<7;i++) deck.push({...pickRandom(cheap),type:'robot',uid:uid(),currentAtk:null,currentHp:null,modules:[],attackedThisTurn:0,hastedTurn:null,summonedTurn:null,temporaryBuffs:[]});
  for(let i=0;i<6;i++) deck.push({...pickRandom(mid),type:'robot',uid:uid(),currentAtk:null,currentHp:null,modules:[],attackedThisTurn:0,hastedTurn:null,summonedTurn:null,temporaryBuffs:[]});
  for(let i=0;i<3;i++) deck.push({...pickRandom(big),type:'robot',uid:uid(),currentAtk:null,currentHp:null,modules:[],attackedThisTurn:0,hastedTurn:null,summonedTurn:null,temporaryBuffs:[]});
  // 9 Batterien (2 kleine, 4 mittlere, 3 große)
  for(let i=0;i<9;i++){
    const pool = i<2?BATTERIES.filter(b=>b.energy<=2):(i<6?BATTERIES.filter(b=>b.energy<=3):BATTERIES);
    deck.push({...pickRandom(pool),type:'battery',cost:0,uid:uid()});
  }
  // 5 Module
  for(let i=0;i<5;i++) deck.push({...pickRandom(MODULES),type:'module',uid:uid()});
  return shuffle(deck);
}

function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
let _uid=0;function uid(){return 'u'+(++_uid)}

/* ---------- DECKBUILDER & STORAGE ---------- */
const CUSTOM_DECK_KEY = 'botduel-custom-deck-v1';
const MAX_COPIES_PER_CARD = 3;
const TARGET_DECK_SIZE = 30;

function loadCustomDeck(){
  try{
    const raw = localStorage.getItem(CUSTOM_DECK_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : null;
  }catch(e){ return null; }
}
function saveCustomDeck(spec){
  try{ localStorage.setItem(CUSTOM_DECK_KEY, JSON.stringify(spec)); return true; }catch(e){ return false; }
}
function customDeckIsValid(spec){
  if(!Array.isArray(spec)) return false;
  const total = spec.reduce((s,e)=>s+(e.count||0),0);
  if(total !== TARGET_DECK_SIZE) return false;
  // Jeder Eintrag muss gültige Karte referenzieren
  return spec.every(e => CARD_INDEX[e.cardId] && e.count >= 1 && e.count <= MAX_COPIES_PER_CARD);
}
function buildDeckFromSpec(spec){
  const deck = [];
  spec.forEach(entry=>{
    const card = CARD_INDEX[entry.cardId];
    if(!card) return;
    for(let i=0;i<entry.count;i++){
      deck.push({...card, type:card.type, uid:uid(),
        currentAtk:null, currentHp:null, modules:[],
        attackedThisTurn:0, hastedTurn:null, summonedTurn:null, temporaryBuffs:[]});
    }
  });
  return shuffle(deck);
}

/* ---------- SPIEL-LOGIK ---------- */

function startGame(useCustomDeck){
  initAudio();
  resetRenderTracking();
  state = freshState(useCustomDeck);
  state.screen = 'game';
  // initial hand (still ohne Sound)
  const _se = soundEnabled; soundEnabled = false;
  for(let i=0;i<STARTING_HAND;i++){drawCard('me');drawCard('ai');}
  soundEnabled = _se;
  log(useCustomDeck && customDeckIsValid(loadCustomDeck()) ? 'Duel started with your custom deck. Your turn.' : 'Duel started (random deck). Your turn.');
  render();
  setTimeout(()=>{ SFX.turnStart(); }, 100);
  // Tutorial beim ersten Spiel anzeigen
  if(shouldShowTutorial()){
    setTimeout(()=>{ startTutorial(); }, 600);
  }
}

function drawCard(who, count=1){
  const p = state.players[who];
  let fatigue = 0;
  let skipped = 0;
  for(let i=0;i<count;i++){
    if(p.hand.length >= MAX_HAND){
      // Hand voll: Karte BLEIBT im Deck (wird nicht gezogen)
      skipped++;
      continue;
    }
    if(p.deck.length===0){
      fatigue++;
      continue;
    }
    const card = p.deck.shift();
    p.hand.push(card);
    if(who==='me') SFX.draw();
  }
  if(fatigue > 0){
    p.hp -= fatigue;
    log(`${p.name}: Deck empty, ${fatigue} fatigue (−${fatigue} HP)`);
    if(who==='me') floatTextAtPlayer(who,`-${fatigue} FATIGUE`,'damage');
  }
  if(skipped > 0){
    log(`${p.name}: Hand full, ${skipped} card(s) stay in deck`);
  }
}

function energyAvailable(who){
  const p = state.players[who];
  return p.field.batteries.reduce((s,b)=>s+(b.charge||0),0) + (p.bonusEnergy||0);
}

function energyTotal(who){
  // Maximale Kapazität aller Batterien (für UI-Anzeige X/Y)
  const p = state.players[who];
  return p.field.batteries.reduce((s,b)=>s+(b.maxCharge||b.energy||0),0) + (p.bonusEnergy||0);
}

// Verbraucht Energie aus Bonus und Batterien (niedrigste Ladung zuerst, um Slots freizubekommen)
function consumeEnergy(who, amount){
  const p = state.players[who];
  let rem = amount;
  // zuerst bonusEnergy
  if(p.bonusEnergy>0){
    const take = Math.min(p.bonusEnergy, rem);
    p.bonusEnergy -= take;
    rem -= take;
  }
  if(rem<=0) return;
  // dann Batterien, sortiert nach charge aufsteigend
  const sorted = [...p.field.batteries].sort((a,b)=>(a.charge||0)-(b.charge||0));
  for(const b of sorted){
    if(rem<=0) break;
    const take = Math.min(b.charge||0, rem);
    b.charge -= take;
    rem -= take;
  }
  // Erschöpfte nicht-erneuerbare Batterien zerstören
  const before = p.field.batteries.length;
  p.field.batteries = p.field.batteries.filter(b=>{
    if((b.charge||0) <= 0 && !b.renewable){
      log(`⚡ ${b.name} depleted (destroyed)`);
      // Backup-Trigger: andere Backup-Gens bekommen +1
      p.field.batteries.forEach(other=>{
        if(other!==b && other.key==='backup'){
          other.charge = Math.min(other.maxCharge||other.energy, (other.charge||0)+1);
          log(`  → ${other.name} charges +1 (Backup)`);
        }
      });
      return false;
    }
    return true;
  });
}

function currentAtk(robot){
  let base = robot.atk;
  (robot.modules||[]).forEach(m=>{if(m.effect?.atk) base += m.effect.atk});
  (robot.temporaryBuffs||[]).forEach(b=>{if(b.atk) base += b.atk});
  const owner = findOwnerOfRobot(robot);
  if(owner){
    // Brennstoffzelle: Humanoide +1 ATK
    if(robot.arche?.startsWith('humanoid') && state.players[owner].field.batteries.some(b=>b.key==='fuelcell' && b.charge>0)) base+=1;
    // Synergien aus eigenem Feld
    base += synergyAtkBonus(robot, owner);
    // Playful-Debuff vom Gegner
    const opp = owner==='me'?'ai':'me';
    if(state.players[opp]?.playfulActive) base = Math.max(0, base-1);
  }
  return Math.max(0, base);
}
function currentHp(robot){
  let base = robot.hp;
  (robot.modules||[]).forEach(m=>{if(m.effect?.hp) base += m.effect.hp});
  (robot.temporaryBuffs||[]).forEach(b=>{if(b.hp) base += b.hp});
  const owner = findOwnerOfRobot(robot);
  if(owner) base += synergyHpBonus(robot, owner);
  return base;
}
function findOwnerOfRobot(robot){
  if(state.players.me.field.robots.includes(robot))return 'me';
  if(state.players.ai.field.robots.includes(robot))return 'ai';
  return null;
}

/* ---------- SYNERGIE-ENGINE ----------
 * Synergien basieren auf:
 *  - arche (humanoid_tall, quadruped, vacuum, arm, mower, patrol, delivery, rover, pet)
 *  - maker (Hersteller)
 * Neue Karten haben Fähigkeits-Keys mit "syn"-Präfix; existierende Karten wirken als Anker.
 */

// Hilfsfunktion: zähle eigene Roboter mit bestimmtem Archetyp (außer self)
function countArche(side, arche, exclude){
  return state.players[side].field.robots.filter(r=>r!==exclude && r.arche===arche).length;
}
function countMaker(side, maker, exclude){
  return state.players[side].field.robots.filter(r=>r!==exclude && r.maker===maker).length;
}
function countAny(side, predicate, exclude){
  return state.players[side].field.robots.filter(r=>r!==exclude && predicate(r)).length;
}

function synergyAtkBonus(robot, side){
  let bonus = 0;
  const field = state.players[side].field.robots;
  
  // Archetyp-Synergien: Verhalten von "Anker"-Robotern, die andere des gleichen Typs buffen
  // Optimus: alle Humanoide bekommen +1 ATK wenn Optimus im Feld
  if(robot.arche?.startsWith('humanoid') && field.some(r=>r!==robot && r.id==='r02')) bonus += 1;
  // Spot: alle Quadrupeds +1 ATK
  if(robot.arche==='quadruped' && field.some(r=>r!==robot && r.id==='r13')) bonus += 1;
  // Fanuc CR: alle Arme +1 ATK
  if(robot.arche==='arm' && field.some(r=>r!==robot && r.id==='r20')) bonus += 1;
  
  // Schwarm-Bonus: kleine Roboter (cost ≤ 1) bekommen +1 ATK pro 3 weiteren kleinen Robotern
  if(robot.cost <= 1){
    const swarmCount = countAny(side, r=>r.cost<=1, robot);
    if(swarmCount >= 3) bonus += Math.floor(swarmCount / 3);
  }
  
  // Boston-Dynamics-Synergie: jeder weitere BD-Roboter gibt +1 ATK an alle BD
  if(robot.maker === 'Boston Dynamics'){
    bonus += countMaker(side, 'Boston Dynamics', robot);
  }
  
  // Unitree-Synergie: jeder weitere Unitree-Roboter gibt +1 ATK
  if(robot.maker === 'Unitree'){
    bonus += countMaker(side, 'Unitree', robot);
  }
  
  // NASA-Synergie (Rover/Space-Bonus): NASA-Roboter geben sich gegenseitig +1 ATK
  if(robot.maker === 'NASA'){
    bonus += countMaker(side, 'NASA', robot);
  }
  
  // Tesla-Synergie (Elon's Flotte): +1 ATK pro weiteren Tesla
  if(robot.maker === 'Tesla'){
    bonus += countMaker(side, 'Tesla', robot);
  }
  
  // Agility Robotics Lager: +1 ATK pro weiteren Agility
  if(robot.maker === 'Agility Robotics'){
    bonus += countMaker(side, 'Agility Robotics', robot);
  }
  
  // Pudu Gastro-Team: +1 ATK pro weiteren Pudu-Roboter (Delivery-Schwarm)
  if(robot.maker === 'Pudu Robotics'){
    bonus += countMaker(side, 'Pudu Robotics', robot);
  }
  
  // SoftBank-Synergie (NAO + Pepper)
  if(robot.maker === 'SoftBank'){
    bonus += countMaker(side, 'SoftBank', robot);
  }
  
  // iRobot-Synergie
  if(robot.maker === 'iRobot' || robot.maker === 'Roborock' || robot.maker === 'Dyson' || robot.maker === 'Ecovacs'){
    // Vacuum-Schwarm: alle Saugroboter stärken sich
    const vacuumCount = state.players[side].field.robots.filter(r=>r!==robot && r.arche==='vacuum').length;
    if(vacuumCount >= 2) bonus += 1; // ab 3 Vacuums insgesamt, alle +1 ATK
  }
  
  return bonus;
}

function synergyHpBonus(robot, side){
  let bonus = 0;
  const field = state.players[side].field.robots;
  
  // Phoenix als Anker: alle anderen Roboter +1 HP
  if(field.some(r=>r!==robot && r.id==='r08')) bonus += 1;
  
  // Industrie-Block (Arme): alle Arme +1 HP für jeden weiteren Arm
  if(robot.arche==='arm'){
    bonus += countArche(side, 'arm', robot);
  }
  
  // Rover-Synergie: Rover +1 HP für jeden anderen Rover
  if(robot.arche==='rover'){
    bonus += countArche(side, 'rover', robot);
  }
  
  return bonus;
}

// Erklärt für Tooltip welche Synergien gerade aktiv sind
function explainSynergies(robot, side){
  const reasons = [];
  const field = state.players[side].field.robots;
  
  // Fuel Cell (ATK)
  if(robot.arche?.startsWith('humanoid') && state.players[side].field.batteries.some(b=>b.key==='fuelcell' && b.charge>0)){
    reasons.push('+1 ATK from Fuel Cell (Humanoid)');
  }
  
  // Anchor-ATK
  if(robot.arche?.startsWith('humanoid') && field.some(r=>r!==robot && r.id==='r02')){
    reasons.push('+1 ATK from Optimus (Humanoid Leader)');
  }
  if(robot.arche==='quadruped' && field.some(r=>r!==robot && r.id==='r13')){
    reasons.push('+1 ATK from Spot (Pack Leader)');
  }
  if(robot.arche==='arm' && field.some(r=>r!==robot && r.id==='r20')){
    reasons.push('+1 ATK from Fanuc CR (Industry Standard)');
  }
  
  // Swarm
  if(robot.cost <= 1){
    const swarm = countAny(side, r=>r.cost<=1, robot);
    if(swarm >= 3){
      reasons.push(`+${Math.floor(swarm/3)} ATK swarm bonus (${swarm} small robots)`);
    }
  }
  
  // Maker-Synergies
  const makerSynergies = ['Boston Dynamics','Unitree','NASA','Tesla','Agility Robotics','Pudu Robotics','SoftBank'];
  if(makerSynergies.includes(robot.maker)){
    const n = countMaker(side, robot.maker, robot);
    if(n > 0) reasons.push(`+${n} ATK from ${n} additional ${robot.maker} robot(s)`);
  }
  // Vacuum-Swarm
  if(['iRobot','Roborock','Dyson','Ecovacs','Anker','Samsung','SharkNinja','Neato','Xiaomi','Narwal'].includes(robot.maker)){
    const vacuumCount = state.players[side].field.robots.filter(r=>r!==robot && r.arche==='vacuum').length;
    if(vacuumCount >= 2) reasons.push(`+1 ATK from vacuum swarm (${vacuumCount+1} vacuums)`);
  }
  
  // HP-Synergies
  if(field.some(r=>r!==robot && r.id==='r08')){
    reasons.push('+1 HP from Phoenix (Protection Field)');
  }
  if(robot.arche==='arm'){
    const n = countArche(side, 'arm', robot);
    if(n > 0) reasons.push(`+${n} HP from ${n} additional arm(s) (Industry Stack)`);
  }
  if(robot.arche==='rover'){
    const n = countArche(side, 'rover', robot);
    if(n > 0) reasons.push(`+${n} HP from ${n} additional rover(s) (Space Program)`);
  }
  
  // Playful-Debuff
  const opp = side==='me'?'ai':'me';
  if(state.players[opp]?.playfulActive){
    reasons.push('−1 ATK from opponent Playful debuff');
  }
  
  return reasons;
}

// === Vorausberechnete Synergie-Vorschau (für Hover-Highlight in der Hand) ===
// Gibt zurück: welche eigenen Roboter würden vom Spielen dieser Hand-Karte profitieren?
function previewSynergyTargets(card, side){
  if(card.type !== 'robot') return [];
  const field = state.players[side].field.robots;
  const affected = new Set();
  // Optimus: würde alle Humanoide buffen
  if(card.id==='r02'){
    field.forEach(r=>{ if(r.arche?.startsWith('humanoid')) affected.add(r.uid); });
  }
  if(card.id==='r13'){
    field.forEach(r=>{ if(r.arche==='quadruped') affected.add(r.uid); });
  }
  if(card.id==='r08'){
    field.forEach(r=>{ if(r.arche?.startsWith('humanoid') || r) affected.add(r.uid); });
  }
  if(card.id==='r20'){
    field.forEach(r=>{ if(r.arche==='arm') affected.add(r.uid); });
  }
  // Hersteller-Synergien
  if(card.maker){
    field.forEach(r=>{ if(r.maker === card.maker && ['Boston Dynamics','Unitree','NASA'].includes(card.maker)) affected.add(r.uid); });
  }
  // Archetyp-Stack (Arm/Rover bekommen +1 HP)
  if(card.arche === 'arm') field.forEach(r=>{ if(r.arche==='arm') affected.add(r.uid); });
  if(card.arche === 'rover') field.forEach(r=>{ if(r.arche==='rover') affected.add(r.uid); });
  return [...affected];
}

function canPlayCard(who, card){
  if(who !== state.turn) return false;
  if(card.type === 'battery'){
    // Nur 1 Batterie pro Zug
    return !state.players[who].playedBatteryThisTurn;
  }
  if(card.type === 'robot'){
    let cost = card.cost;
    // Knightscope tax
    const opp = who==='me'?'ai':'me';
    if(state.players[opp].field.robots.some(r=>r.key==='tax')) cost += 1;
    // wireless discount (nur wenn noch Charge da)
    if(state.players[who].field.batteries.some(b=>b.key==='discountOnce' && !b.wirelessUsed && b.charge>0)) cost = Math.max(1,cost-1);
    return energyAvailable(who) >= cost;
  }
  if(card.type === 'module'){
    if(state.players[who].field.robots.length===0) return false;
    return energyAvailable(who) >= card.cost;
  }
  return false;
}

function playCard(who, cardUid, targetUid=null){
  const p = state.players[who];
  const idx = p.hand.findIndex(c=>c.uid===cardUid);
  if(idx<0) return false;
  const card = p.hand[idx];
  if(!canPlayCard(who,card)){toast('Not enough energy or invalid','bad');return false;}

  if(card.type==='battery'){
    p.hand.splice(idx,1);
    // Batterie kommt mit voller Ladung aufs Feld
    const batt = {...card, charge:card.energy, maxCharge:card.energy, usedThisTurn:false, wirelessUsed:false, owner:who};
    p.field.batteries.push(batt);
    p.playedBatteryThisTurn = true;
    log(`${p.name} plays: ${card.name} (${batt.charge}/${batt.maxCharge}⚡)`);
    SFX.cardBattery();
    // Batterie-Fähigkeiten bei Einsatz
    if(card.key==='drawEnter'){drawCard(who,1);log(`  → +1 card`);}
    if(card.key==='burst'){
      // Burst: alle Ladung sofort in bonusEnergy transferieren, Batterie zerstört
      p.bonusEnergy = (p.bonusEnergy||0) + batt.charge;
      batt.charge = 0;
      p.field.batteries = p.field.batteries.filter(b=>b!==batt);
      log(`  → Burst: +${card.energy} bonus energy, battery depleted`);
      SFX.charge();
    }
    if(card.key==='rtg'){p.hp -= 2; log(`  → RTG radiation: −2 HP`); floatTextAtPlayer(who,'-2','damage');}
    render();
    return true;
  }

  if(card.type==='robot'){
    let cost = card.cost;
    const opp = who==='me'?'ai':'me';
    if(state.players[opp].field.robots.some(r=>r.key==='tax')) cost += 1;
    const wireless = p.field.batteries.find(b=>b.key==='discountOnce' && !b.wirelessUsed && b.charge>0);
    if(wireless){cost = Math.max(1,cost-1); wireless.wirelessUsed = true;}
    p.hand.splice(idx,1);
    consumeEnergy(who, cost);
    const robot = {...card,summonedTurn:state.turnNumber,attackedThisTurn:0,modules:[],temporaryBuffs:[]};
    p.field.robots.push(robot);
    log(`${p.name} deploys ${card.name} (−${cost}⚡)`);
    SFX.cardRobot();
    triggerEnter(robot,who);
    render();
    return true;
  }

  if(card.type==='module'){
    // Braucht Ziel (eigener Roboter)
    if(!targetUid){
      state.pendingModule = card.uid;
      toast('Choose one of your robots to attach to','warn');
      render();
      return false;
    }
    const target = p.field.robots.find(r=>r.uid===targetUid);
    if(!target){toast('Invalid target','bad');return false;}
    p.hand.splice(idx,1);
    consumeEnergy(who, card.cost);
    target.modules = target.modules || [];
    target.modules.push({...card});
    log(`${p.name} attaches ${card.name} to ${target.name}`);
    SFX.cardModule();
    // Visueller Puls am Roboter
    const defKeys = ['shield2','shield3','shield4','shield5','thorns1','thorns2','reflect','bodyguard','armor1','survive','revive','returnHand','dodgeOnce','blockNext','untarget','heal1','heal2'];
    if(defKeys.includes(card.key)){
      animateCard(target.uid, 'shield-flash', 600);
    } else {
      animateCard(target.uid, 'healing', 700);
    }
    triggerModuleAttach(target, card, who);
    state.pendingModule = null;
    render();
    return true;
  }
}

function triggerEnter(robot, who){
  const p = state.players[who];
  const opp = who==='me'?'ai':'me';
  switch(robot.key){
    case 'gentle': p.hp = Math.min(INITIAL_HP, p.hp+2); log(`  → ${robot.name}: +2 HP for ${p.name}`); break;
    case 'drawEnter': drawCard(who,1); log(`  → ${robot.name}: +1 card`); break;
    case 'drawEnterNoAttack': drawCard(who,1); log(`  → ${robot.name}: +1 card`); break;
    case 'courier': p.bonusEnergy = (p.bonusEnergy||0)+2; log(`  → ${robot.name}: +2 energy next turn`); break;
    case 'explorer': p.bonusEnergy = (p.bonusEnergy||0)+2; log(`  → ${robot.name}: +2 energy`); break;
    case 'peekHand': 
      if(state.players[opp].hand.length>0){
        const n = Math.min(2, state.players[opp].hand.length);
        const shown = state.players[opp].hand.slice(0,n).map(c=>c.name).join(', ');
        log(`  → ${robot.name}: opponent hand shows: ${shown}`);
        if(who==='me'){ toast(`Opponent has: ${shown}`,'good'); SFX.peek(); }
      }
      break;
    case 'haste': robot.hastedTurn = state.turnNumber; break;
    case 'charismatic': state.players[opp].skipTurn = true; log(`  → ${robot.name}: opponent skips next turn!`); break;
  }
  // Wenn Roboter haste hat durch default (vacuum mit haste key), markieren
}

function triggerModuleAttach(robot, mod, who){
  switch(mod.key){
    case 'drawAttach': drawCard(who,1); log(`  → ${mod.name}: +1 card`); break;
    case 'haste': robot.hastedTurn = state.turnNumber; break;
    // Defensive: Schilde
    case 'shield2': robot.shield = (robot.shield||0)+2; break;
    case 'shield3': robot.shield = (robot.shield||0)+3; break;
    case 'shield4': robot.shield = (robot.shield||0)+4; break;
    case 'shield5': robot.shield = (robot.shield||0)+5; break;
    // Dornen: addieren sich
    case 'thorns1': robot.thorns = (robot.thorns||0)+1; break;
    case 'thorns2': robot.thorns = (robot.thorns||0)+2; break;
    // One-Shot-Defense
    case 'reflect': robot.reflectReady = true; break;
    case 'dodgeOnce': robot.dodgeReady = true; break;
    case 'blockNext': robot.blockReady = true; break;
    case 'untarget': robot.untargetUntil = state.turnNumber + 1; break; // überspringt 1 Zug
    // Dauerhafte Damage Reduction (armor1 = -1 pro Treffer)
    case 'armor1': robot.armor = (robot.armor||0)+1; break;
    // Heilung/Regen wird in nextTurn ausgewertet (per Modul-Check, keine zusätzliche Init nötig)
    case 'peekHand': {
      const opp = who==='me'?'ai':'me';
      const n = Math.min(2, state.players[opp].hand.length);
      if(n>0){
        const shown = state.players[opp].hand.slice(0,n).map(c=>c.name).join(', ');
        log(`  → ${mod.name}: ${shown}`);
        if(who==='me') toast(`Opponent has: ${shown}`,'good');
      }
      break;
    }
    case 'peekDeep': {
      const opp = who==='me'?'ai':'me';
      const n = Math.min(3, state.players[opp].hand.length);
      if(n>0){
        const shown = state.players[opp].hand.slice(0,n).map(c=>c.name).join(', ');
        log(`  → ${mod.name}: ${shown}`);
        if(who==='me') toast(`${shown}`,'good');
      }
      break;
    }
    case 'auxEnergy': state.players[who].bonusEnergy = (state.players[who].bonusEnergy||0)+1; break;
    case 'jammer': {
      const opp = who==='me'?'ai':'me';
      const oppRobots = state.players[opp].field.robots.filter(r=>r.modules?.length>0);
      if(oppRobots.length){
        const target = pickRandom(oppRobots);
        const removed = target.modules.shift();
        log(`  → Jammer: removed ${removed.name} from ${target.name}`);
      }
      break;
    }
    case 'combine': {
      const smalls = state.players[who].field.robots.filter(r=>r.cost<=2 && r.uid!==robot.uid).sort((a,b)=>a.cost-b.cost);
      if(smalls.length>=2){
        const a = smalls[0], b = smalls[1];
        // erzeuge neuen Kombi-Roboter
        const combined = {
          ...robot,
          uid:uid(),
          name:`${a.name}+${b.name}`,
          atk:a.atk+b.atk+1,
          hp:a.hp+b.hp+1,
          arche:'humanoid_tall',
          cost:a.cost+b.cost,
          maker:'KOMBINAT',
          ability:'Fusion robot',
          c:robot.c,
          key:null,
          summonedTurn:state.turnNumber,
          attackedThisTurn:0,
          modules:[],
          temporaryBuffs:[],
          hastedTurn:state.turnNumber,
        };
        // entferne a, b
        state.players[who].field.robots = state.players[who].field.robots.filter(r=>r.uid!==a.uid && r.uid!==b.uid);
        state.players[who].field.robots.push(combined);
        log(`  → Combine: ${a.name}+${b.name} → ${combined.name} (${combined.atk}/${combined.hp})`);
      } else {
        toast('Need at least 2 small robots to combine','bad');
      }
      break;
    }
  }
}

/* ---------- ANGRIFF ---------- */

// Wendet Schaden auf einen Roboter an und berücksichtigt alle Defensiv-Mechaniken
// Rückgabe: { dealt: tatsächlich zugefügter Schaden, dodged: true/false, blocked, reflected }
function applyDamage(target, amount, isAttackFrom){
  // isAttackFrom: der angreifende Roboter (für Reflect, Thorns)
  // Check 1: Block-Next
  if(target.blockReady){
    target.blockReady = false;
    log(`  🛡 ${target.name}: barrier blocks attack completely`);
    return {dealt:0, blocked:true};
  }
  // Check 2: Dodge
  if(target.dodgeReady){
    target.dodgeReady = false;
    log(`  ☁ ${target.name}: missed through smoke`);
    return {dealt:0, dodged:true};
  }
  // Check 3: Reflect (einmalig) — reflektiert eingehenden Schaden 1:1 zurück
  if(target.reflectReady){
    target.reflectReady = false;
    log(`  ◈ ${target.name} reflects ${amount} damage back`);
    if(isAttackFrom){
      // Angreifer erleidet Schaden, aber ohne weitere Reflect-Kette
      const atkHp = isAttackFrom.currentHpRemaining ?? currentHp(isAttackFrom);
      isAttackFrom.currentHpRemaining = atkHp - amount;
    }
    return {dealt:0, reflected:true};
  }
  // Armor: Pauschal-Reduktion
  let dmg = amount;
  if(target.armor){
    dmg = Math.max(0, dmg - target.armor);
  }
  // Tough (Basis-Fähigkeit)
  if(target.key==='tough') dmg = Math.max(0, dmg-1);
  // Shield absorbiert zuerst
  if(target.shield && target.shield > 0){
    const absorbed = Math.min(target.shield, dmg);
    target.shield -= absorbed;
    dmg -= absorbed;
    log(`  ◯ ${target.name}: shield absorbs ${absorbed} (remaining: ${target.shield})`);
    // Sofort-Effekte (auch wenn Animation in doAttack zentral läuft)
    setTimeout(()=>{ SFX.shield(); animateCard(target.uid,'shield-flash',500); floatText(target.uid,`◯-${absorbed}`,'shield'); },220);
  }
  // Rest wird von HP abgezogen
  const hp = target.currentHpRemaining ?? currentHp(target);
  target.currentHpRemaining = hp - dmg;
  return {dealt:dmg};
}

// Prüft Bodyguard-Umleitung: gibt den tatsächlichen Ziel-Roboter zurück
function resolveBodyguardRedirect(sideKey, intendedTarget){
  if(!intendedTarget) return null; // Angriff aufs Gesicht, kein Redirect
  // Bodyguard wird nur umgeleitet wenn das intendedTarget NICHT selbst Bodyguard ist
  const bg = state.players[sideKey].field.robots.find(r=>
    r!==intendedTarget && r.modules?.some(m=>m.key==='bodyguard')
  );
  if(bg){
    log(`  ☗ Bodyguard ${bg.name} intercepts attack for ${intendedTarget.name}`);
    return bg;
  }
  return intendedTarget;
}

function canAttack(robot){
  if(robot.key==='drawEnterNoAttack' || robot.key==='courier') return false;
  if(robot.summonedTurn === state.turnNumber && robot.hastedTurn !== state.turnNumber && robot.key!=='haste') return false;
  // heavy module: nur alle 2 Runden
  if(robot.modules?.some(m=>m.key==='heavy')){
    if((robot.heavyCooldown||0) >= state.turnNumber) return false;
  }
  const maxAttacks = robot.key==='dualAttack' ? 2 : 1;
  if((robot.attackedThisTurn||0) >= maxAttacks) return false;
  return true;
}

function validTargets(attackerSide){
  const defSide = attackerSide==='me'?'ai':'me';
  // Untargetable herausfiltern (aktive Tarnung)
  const defField = state.players[defSide].field.robots.filter(r=>
    !(r.untargetUntil && r.untargetUntil > state.turnNumber)
  );
  // Taunt: wenn Gegner Taunt-Robot hat, muss dieser zuerst
  const taunts = defField.filter(r=>r.key==='taunt' || r.modules?.some(m=>m.key==='taunt'));
  if(taunts.length){
    return {mode:'taunt',list:taunts};
  }
  // Bodyguard zwingt nicht komplett, aber wird bei Angriffs-Resolution umgeleitet
  if(defField.length === 0){
    // Prüfe ob insgesamt Roboter da sind (auch untargetable)
    if(state.players[defSide].field.robots.length === 0){
      return {mode:'face',list:[]};
    }
    // Alle sind untargetable → trotzdem Face-Attack erlauben? Nein, Flying nötig
    return {mode:'face',list:[]};
  }
  return {mode:'free',list:defField};
}

function doAttack(attacker, targetUid){
  const atkSide = findOwnerOfRobot(attacker);
  const defSide = atkSide==='me'?'ai':'me';
  
  // stealth: erster Angriff auf Spieler
  const hasStealth = attacker.modules?.some(m=>m.key==='stealth') && !attacker.stealthUsed;
  
  let targetRobot = null;
  if(targetUid && targetUid !== 'face'){
    targetRobot = state.players[defSide].field.robots.find(r=>r.uid===targetUid);
    // Untargetable blockt
    if(targetRobot && targetRobot.untargetUntil && targetRobot.untargetUntil > state.turnNumber){
      toast(`${targetRobot.name} cannot be targeted (Stealth)`,'bad');
      return;
    }
  }

  const targets = validTargets(atkSide);
  const hasFlying = attacker.modules?.some(m=>m.key==='flying') || attacker.key==='flying';
  
  if(!targetRobot && targets.mode!=='face' && !hasFlying && !hasStealth){
    toast('You must attack a robot (blocker present)','bad');
    return;
  }
  
  // Bodyguard-Umleitung: wenn Roboter angegriffen wird und ein Bodyguard auf dessen Seite existiert
  if(targetRobot){
    const redirected = resolveBodyguardRedirect(defSide, targetRobot);
    if(redirected !== targetRobot){
      targetRobot = redirected;
    }
  }
  
  let atk = currentAtk(attacker);
  if(attacker.key==='acrobatic') atk += 2;
  if(attacker.key==='agile' && (attacker.attackedThisTurn||0)===0) atk += 2;
  const antiHuman = attacker.key==='antiHuman' || attacker.modules?.some(m=>m.key==='antiHuman');
  if(antiHuman && targetRobot && targetRobot.arche?.startsWith('humanoid')) atk += 2;
  if(attacker.key==='antiArm' && targetRobot && targetRobot.arche==='arm') atk += 2;
  if(attacker.key==='underdog' && state.players[defSide].field.robots.length > state.players[atkSide].field.robots.length) atk += 1;
  if(attacker.key==='finisher' && targetRobot && currentHp(targetRobot)<=1) atk += 1;
  const kinetic = state.players[atkSide].field.batteries.find(b=>b.key==='kinetic');
  
  if(!targetRobot){
    // direkter Angriff auf Gegner-Gesicht
    SFX.attack();
    animateCard(attacker.uid, 'attacking', 450);
    state.players[defSide].hp -= atk;
    log(`⚔ ${attacker.name} → ${state.players[defSide].name} (−${atk} HP)`);
    if(hasStealth) attacker.stealthUsed = true;
    // Delayed: damage flash + float number
    setTimeout(()=>{
      floatTextAtPlayer(defSide, `-${atk}`, 'damage');
      SFX.damage();
      screenFlash(defSide==='me'?'red':'red');
    }, 220);
  } else {
    // Kampf zwischen Robotern
    let defAtk = currentAtk(targetRobot);
    
    let extraPiercing = 0;
    if(attacker.key==='pierce'){
      extraPiercing = (targetRobot.modules||[]).filter(m=>m.effect?.hp).reduce((s,m)=>s+m.effect.hp,0);
    }
    
    SFX.attack();
    animateCard(attacker.uid, 'attacking', 450);
    
    // Schaden beiderseits via applyDamage
    const atkResult = applyDamage(targetRobot, atk + extraPiercing, attacker);
    const defResult = applyDamage(attacker, defAtk, targetRobot);
    
    log(`⚔ ${attacker.name}(${atk}) ↔ ${targetRobot.name}(${defAtk})`);
    
    // Thorns: wenn Verteidiger Dornen hat und Angreifer Schaden zugefügt hat
    if(targetRobot.thorns && atkResult.dealt > 0){
      const hp = attacker.currentHpRemaining ?? currentHp(attacker);
      attacker.currentHpRemaining = hp - targetRobot.thorns;
      log(`  ✦ ${targetRobot.name}: Thorns (${targetRobot.thorns}) on ${attacker.name}`);
    }
    
    // Lernt
    if(attacker.key==='learns'){attacker.temporaryBuffs.push({atk:1,hp:1});log(`  → ${attacker.name} learns: +1/+1`);}
    // Solarskin
    if(attacker.modules?.some(m=>m.key==='solarskin') && (attacker.currentHpRemaining||0)>0){
      state.players[atkSide].bonusEnergy = (state.players[atkSide].bonusEnergy||0)+1;
      log(`  → Solar Skin: +1 energy`);
    }
    
    // === VISUELLE EFFEKTE mit leichter Verzögerung nach Lunge ===
    setTimeout(()=>{
      // Angreifer-Treffer auf Ziel
      if(atkResult.blocked){
        floatText(targetRobot.uid, 'BLOCK!', 'shield');
        animateCard(targetRobot.uid, 'shield-flash', 600);
        SFX.shield();
      } else if(atkResult.dodged){
        floatText(targetRobot.uid, 'MISS!', 'shield');
        SFX.shield();
      } else if(atkResult.reflected){
        floatText(targetRobot.uid, 'REFLEKT!', 'shield');
        animateCard(targetRobot.uid, 'shield-flash', 600);
        floatText(attacker.uid, `-${atk+extraPiercing}`, 'damage');
        animateCard(attacker.uid, 'damaged', 500);
        SFX.shield();
      } else if(atkResult.dealt > 0){
        floatText(targetRobot.uid, `-${atkResult.dealt}`, 'damage');
        animateCard(targetRobot.uid, 'damaged', 500);
        SFX.damage();
      }
      // Zusätzliche Shield-Anzeige wenn Schild zumindest teilweise absorbiert hat
      const shieldMod = targetRobot.modules?.find(m=>['shield2','shield3','shield4','shield5'].includes(m.key));
      if(shieldMod && (targetRobot.shield||0) >= 0 && atkResult.dealt < (atk+extraPiercing) && !atkResult.blocked && !atkResult.dodged && !atkResult.reflected){
        // Schild hat etwas absorbiert
        animateCard(targetRobot.uid, 'shield-flash', 500);
      }
      // Verteidiger-Gegenschlag auf Angreifer
      if(defResult.dealt > 0){
        floatText(attacker.uid, `-${defResult.dealt}`, 'damage');
        animateCard(attacker.uid, 'damaged', 500);
      } else if(defResult.blocked || defResult.dodged){
        floatText(attacker.uid, 'BLOCK!', 'shield');
      }
      // Thorns-Feedback
      if(targetRobot.thorns && atkResult.dealt > 0){
        floatText(attacker.uid, `✦${targetRobot.thorns}`, 'thorns');
        animateCard(attacker.uid, 'thorns-flash', 500);
        SFX.thorns();
      }
    }, 200);
    
    // Destroy-Animationen für bald-sterbende Karten
    const dyingAtk = (attacker.currentHpRemaining ?? currentHp(attacker)) <= 0
      && !(attacker.modules?.some(m=>['survive','revive','returnHand'].includes(m.key)) && !(attacker.gyroUsed||attacker.reviveUsed||attacker.ejectUsed));
    const dyingDef = (targetRobot.currentHpRemaining ?? currentHp(targetRobot)) <= 0
      && !(targetRobot.modules?.some(m=>['survive','revive','returnHand'].includes(m.key)) && !(targetRobot.gyroUsed||targetRobot.reviveUsed||targetRobot.ejectUsed));
    if(dyingAtk){
      setTimeout(()=>{ animateCard(attacker.uid,'destroyed',550); SFX.destroy(); },350);
    }
    if(dyingDef){
      setTimeout(()=>{ animateCard(targetRobot.uid,'destroyed',550); SFX.destroy(); },350);
    }
    
    checkDestroyed(atkSide);
    checkDestroyed(defSide);
  }
  
  attacker.attackedThisTurn = (attacker.attackedThisTurn||0)+1;
  if(kinetic){
    kinetic.charge = Math.min(kinetic.maxCharge||kinetic.energy, (kinetic.charge||0)+1);
    log(`  → ${kinetic.name} charges +1 (${kinetic.charge})`);
    SFX.charge();
  }
  if(attacker.key==='drawAttack') drawCard(atkSide,1);
  if(attacker.modules?.some(m=>m.key==='heavy')) attacker.heavyCooldown = state.turnNumber + 1;
  
  checkWin();
  // Render leicht verzögert, damit Animationen auf den alten DOM-Elementen laufen können
  setTimeout(()=>{ render(); }, 550);
}

function checkDestroyed(side){
  const p = state.players[side];
  const survivors = [];
  for(const r of p.field.robots){
    const hp = r.currentHpRemaining ?? currentHp(r);
    if(hp > 0){ survivors.push(r); continue; }
    // Überlebens-Mechaniken (in Reihenfolge)
    // 1) Gyroskop/Knautschzone (survive): einmalig bei 1 HP
    if(r.modules?.some(m=>m.key==='survive') && !r.gyroUsed){
      r.gyroUsed = true;
      r.currentHpRemaining = 1;
      log(`  ◎ ${r.name}: Crumple Zone saves with 1 HP`);
      survivors.push(r);
      continue;
    }
    // 2) Backup-Kern / revive: einmalig mit 3 HP
    if(r.modules?.some(m=>m.key==='revive') && !r.reviveUsed){
      r.reviveUsed = true;
      r.currentHpRemaining = 3;
      log(`  ◉ ${r.name}: Backup Core activated (3 HP)`);
      survivors.push(r);
      continue;
    }
    // 3) Notfall-Ejektor / returnHand: einmalig zurück in Hand
    if(r.modules?.some(m=>m.key==='returnHand') && !r.ejectUsed){
      r.ejectUsed = true;
      // Heilen und Modul-Resets entfernen für Rückkehr
      r.currentHpRemaining = null;
      r.shield = 0;
      r.summonedTurn = null;
      r.attackedThisTurn = 0;
      // In Hand zurück, wenn Platz
      if(p.hand.length < MAX_HAND){
        p.hand.push(r);
        log(`  ▲ ${r.name}: Ejector → back to hand`);
      } else {
        log(`  ▲ ${r.name}: Ejector fires but hand full — destroyed`);
      }
      continue; // nicht in Survivors
    }
    // Sonst endgültig zerstört
    log(`☠ ${r.name} destroyed`);
    if(r.key==='loyal'){ drawCard(side,2); }
    // Animation/Sound — nur falls die DOM-Karte noch existiert (nicht bereits in doAttack getriggert)
    setTimeout(()=>{ const el = $card(r.uid); if(el && !el.classList.contains('destroyed')){ animateCard(r.uid,'destroyed',550); SFX.destroy(); } }, 50);
  }
  p.field.robots = survivors;
}

function checkWin(){
  if(state.players.me.hp <= 0){
    if(!state.gameOver){ SFX.lose(); screenFlash('red'); }
    state.gameOver='lose';state.screen='end';
  }
  else if(state.players.ai.hp <= 0){
    if(!state.gameOver){ SFX.win(); screenFlash('green'); }
    state.gameOver='win';state.screen='end';
  }
}

/* ---------- ZUG-ENDE ---------- */

function endTurn(){
  if(state.turn !== 'me') return;
  SFX.turnEnd();
  nextTurn();
}

function nextTurn(){
  // KI-Locks immer am Anfang resetten (Sicherheit gegen Hänger)
  if(typeof aiTurnLock !== 'undefined') aiTurnLock = false;
  if(typeof aiPhaseLock !== 'undefined') aiPhaseLock = false;
  
  // Zug-Ende-Effekte
  const curSide = state.turn;
  const curP = state.players[curSide];
  // Playful reset
  curP.field.robots.forEach(r=>r.playfulApplied = false);
  // reset attacks, temp buffs expire
  curP.field.robots.forEach(r=>{
    r.attackedThisTurn = 0;
  });
  
  // switch
  state.turn = curSide==='me' ? 'ai' : 'me';
  state.turnNumber += 1;
  const newP = state.players[state.turn];
  
  // Zug-Start-Effekte
  if(newP.skipTurn){
    newP.skipTurn = false;
    log(`${newP.name} skips this turn (charmed)`);
    setTimeout(()=>{nextTurn();},900);
    render();
    return;
  }
  
  // Batterie-Reset: wireless/discount-Marker freigeben
  newP.playedBatteryThisTurn = false;
  newP.field.batteries.forEach(b=>{b.wirelessUsed=false; b.usedThisTurn=false;});
  
  // Erneuerbare Batterien aufladen
  newP.field.batteries.forEach(b=>{
    if(b.renewable && b.rechargeRate){
      const before = b.charge;
      b.charge = Math.min(b.maxCharge, (b.charge||0) + b.rechargeRate);
      if(b.charge > before) log(`  ⚡ ${b.name} charges ${before}→${b.charge}`);
    }
  });
  
  // RTG tick (nur wenn aktiv)
  newP.field.batteries.forEach(b=>{if(b.key==='rtg' && b.charge>0){newP.hp-=2;log(`  → RTG: ${newP.name} −2 HP`);floatTextAtPlayer(state.turn,'-2 RTG','damage');}});
  
  // Ziehe 3 Karten pro Zug
  drawCard(state.turn, 3);
  
  // Turn-Start Sound
  if(state.turn==='me') SFX.turnStart();
  
  // Start-of-turn abilities
  const healsToAnimate = [];
  newP.field.robots.forEach(r=>{
    if(r.key==='grows'){
      r.temporaryBuffs = r.temporaryBuffs||[]; r.temporaryBuffs.push({atk:1,hp:1});
      log(`${r.name} grows: +1/+1`);
      healsToAnimate.push({uid:r.uid, text:'+1/+1', kind:'heal'});
    }
    // Heal1
    if(r.key==='heal1' || r.modules?.some(m=>m.key==='heal1')){
      const maxH = currentHp(r);
      const cur = r.currentHpRemaining ?? maxH;
      if(cur < maxH){
        r.currentHpRemaining = Math.min(maxH, cur+1);
        healsToAnimate.push({uid:r.uid, text:'+1', kind:'heal'});
      }
    }
    // Heal2
    if(r.modules?.some(m=>m.key==='heal2')){
      const maxH = currentHp(r);
      const cur = r.currentHpRemaining ?? maxH;
      const newHp = Math.min(maxH, cur+2);
      if(newHp > cur){
        log(`  ✚ ${r.name}: +${newHp-cur} HP (Nanites)`);
        healsToAnimate.push({uid:r.uid, text:'+'+(newHp-cur), kind:'heal'});
      }
      r.currentHpRemaining = newHp;
    }
    // Wachhund
    if(r.key==='peekEveryTurn'){
      const opp = state.turn==='me'?'ai':'me';
      const n = Math.min(2, state.players[opp].hand.length);
      if(n>0 && state.turn==='me') toast(`Opponent's hand: ${state.players[opp].hand.slice(0,n).map(c=>c.name).join(', ')}`,'good');
    }
    if(r.untargetUntil && r.untargetUntil <= state.turnNumber){
      r.untargetUntil = null;
    }
  });
  
  checkWin();
  render();
  // Nach Render: Heal-Animationen triggern (DOM muss neu da sein)
  if(healsToAnimate.length){
    setTimeout(()=>{
      SFX.heal();
      healsToAnimate.forEach(h=>{
        floatText(h.uid, h.text, h.kind);
        animateCard(h.uid, 'healing', 700);
      });
    }, 50);
  }
  
  // AI Zug
  if(state.turn === 'ai' && !state.gameOver){
    setTimeout(aiTurn, 800);
  }
}

/* ---------- AI ---------- */

let aiTurnLock = false;
let aiPhaseLock = false;

// Berechnet realistisch was passieren würde wenn attacker target angreift
// Berücksichtigt Schild, Dornen, Rüstung, Pierce, Bodyguard-Redirect, Reflect, Dodge, Block
function effectiveDamageTo(attacker, target){
  // Bodyguard-Check: Wenn Ziel umgeleitet wird, simulier das
  const sideOfTarget = findOwnerOfRobot(target);
  if(sideOfTarget){
    const bg = state.players[sideOfTarget].field.robots.find(r=>
      r!==target && r.modules?.some(m=>m.key==='bodyguard')
    );
    if(bg) target = bg; // Wir würden eigentlich den Bodyguard treffen
  }
  
  let dmg = currentAtk(attacker);
  // Akrobat / Agil
  if(attacker.key==='acrobatic') dmg += 2;
  if(attacker.key==='agile' && (attacker.attackedThisTurn||0)===0) dmg += 2;
  // Anti-Humanoid
  const antiHuman = attacker.key==='antiHuman' || attacker.modules?.some(m=>m.key==='antiHuman');
  if(antiHuman && target.arche?.startsWith('humanoid')) dmg += 2;
  if(attacker.key==='antiArm' && target.arche==='arm') dmg += 2;
  if(attacker.key==='finisher' && currentHp(target)<=1) dmg += 1;
  
  // Pierce: Rüstungs-HP-Bonus wird als Extra-Schaden gewertet
  if(attacker.key==='pierce'){
    const armorBonus = (target.modules||[]).filter(m=>m.effect?.hp).reduce((s,m)=>s+m.effect.hp,0);
    dmg += armorBonus;
  }
  
  let dmgDealt = dmg;
  
  // Block / Dodge / Reflect — kompletter Negation
  if(target.blockReady || target.dodgeReady){
    dmgDealt = 0;
  } else if(target.reflectReady){
    dmgDealt = 0; // wir machen 0 Schaden, kriegen stattdessen reflektiert
  }
  
  // Tough + Armor reduzieren
  if(target.key==='tough') dmgDealt = Math.max(0, dmgDealt - 1);
  if(target.armor) dmgDealt = Math.max(0, dmgDealt - target.armor);
  
  // Schild absorbiert vor HP
  let shieldRem = target.shield || 0;
  if(shieldRem > 0){
    const absorbed = Math.min(shieldRem, dmgDealt);
    dmgDealt -= absorbed;
  }
  
  // Counter-Schaden: Verteidiger schlägt zurück + ggf. Dornen
  let dmgTaken = currentAtk(target);
  if(attacker.key==='tough') dmgTaken = Math.max(0, dmgTaken - 1);
  if(attacker.armor) dmgTaken = Math.max(0, dmgTaken - attacker.armor);
  // Reflect: kompletter Original-Schaden zurück
  if(target.reflectReady) dmgTaken += dmg;
  // Dornen
  if(target.thorns && dmgDealt > 0) dmgTaken += target.thorns;
  
  return {dmgDealt, dmgTaken};
}

function aiTurn(){
  if(state.turn !== 'ai' || state.gameOver) return;
  if(aiTurnLock) return; // Schutz gegen doppelten Aufruf
  aiTurnLock = true;
  log('— AI TURN —');
  
  // Watchdog: falls KI nach 10 Sekunden noch hängt, zwangsweise weiterschalten
  const watchdog = setTimeout(()=>{
    if(aiTurnLock && state.turn === 'ai' && !state.gameOver){
      console.warn('AI watchdog triggered — forcing turn handoff');
      aiTurnLock = false;
      aiPhaseLock = false;
      log('⚠ AI timeout, your turn');
      nextTurn();
    }
  }, 10000);
  // Watchdog wird in aiAttackPhase aufgehoben wenn KI sauber endet
  state._aiWatchdog = watchdog;
  
  // Während KI spielt: Sound nicht für jede Aktion (zu viel)
  const _se = soundEnabled; soundEnabled = false;
  
  try {
    // ---- KONTEXT-ANALYSE ----
    const me = state.players.ai;
    const enemy = state.players.me;
    const myFieldStrength = me.field.robots.reduce((s,r)=>s + currentAtk(r) + currentHp(r), 0);
    const enemyFieldStrength = enemy.field.robots.reduce((s,r)=>s + currentAtk(r) + currentHp(r), 0);
    const enemyAttackPotential = enemy.field.robots.reduce((s,r)=>s + (canAttack(r)?currentAtk(r):0), 0);
    const inDanger = me.hp <= Math.max(8, enemyAttackPotential * 1.5); // KI ist in Bedrängnis
    const nearVictory = enemy.hp <= 10; // Spieler nahe Niederlage
    const handCardsCost = me.hand.filter(c=>c.type!=='battery').reduce((s,c)=>s+c.cost,0);
    
    // ---- PHASE 1: BATTERIE ----
    // Spielt Batterie wenn: noch nicht gespielt UND (Hand teurer als verfügbare Energie ODER renewable verfügbar)
    if(!me.playedBatteryThisTurn){
      const batteries = me.hand.filter(c=>c.type==='battery');
      if(batteries.length){
        // Bevorzuge: 1) renewable mit hohem rechargeRate, 2) nicht-RTG (RTG kostet HP), 3) hohe energy
        const scored = batteries.map(b=>{
          let score = b.energy * 2;
          if(b.renewable) score += b.rechargeRate * 5; // langfristig wertvoll
          if(b.key==='rtg' && me.hp <= 10) score -= 20; // gefährlich bei niedrigem HP
          if(b.key==='burst' && handCardsCost < energyAvailable('ai') + b.energy) score -= 10; // Burst nur bei Bedarf
          return {b, score};
        }).sort((a,b)=>b.score-a.score);
        playCard('ai', scored[0].b.uid);
      }
    }
    
    // ---- PHASE 2: ROBOTER + MODULE ----
    let safety = 25;
    let lastHandSize = -1;
    while(safety-- > 0){
      const hand = me.hand;
      if(hand.length === lastHandSize) break;
      lastHandSize = hand.length;
      
      const playable = hand.filter(c => canPlayCard('ai',c) && c.type!=='battery');
      if(!playable.length) break;
      
      const robots = playable.filter(c=>c.type==='robot');
      const mods = playable.filter(c=>c.type==='module');
      
      // BEWERTE alle möglichen Aktionen, wähle die beste
      const actions = [];
      
      // Roboter-Optionen
      robots.forEach(r=>{
        let score = r.atk * 2 + r.hp + (r.key ? 3 : 0); // Fähigkeit = Bonus
        // Dringend Blocker brauchen wenn in Gefahr
        if(inDanger && r.hp >= 4) score += 8;
        if(inDanger && r.key==='taunt') score += 12;
        // Kein "leeres Feld" auffüllen mit Kuriern wenn schon Roboter da
        if(r.atk === 0 && me.field.robots.length >= 2) score -= 5;
        // Boost wenn Feld leer
        if(me.field.robots.length === 0) score += 10;
        // Bevorzuge günstige Roboter wenn Energie knapp
        const remainingEnergy = energyAvailable('ai') - r.cost;
        if(remainingEnergy < 0) return; // sollte nicht passieren wegen canPlayCard, aber safe
        score -= r.cost * 0.5; // leichte Bevorzugung günstiger
        // SYNERGIE-AWARENESS: bewerte ob dieser Roboter Synergien aktivieren würde
        const synergyTargets = previewSynergyTargets(r, 'ai');
        score += synergyTargets.length * 3; // pro Roboter, der davon profitiert
        // Hersteller-Synergie wenn schon eigene Hersteller-Roboter da
        if(['Boston Dynamics','Unitree','NASA'].includes(r.maker)){
          const sameMaker = countMaker('ai', r.maker, null);
          score += sameMaker * 2;
        }
        // Archetyp-Stack: Arme/Rover bekommen +1 HP wenn schon einer da
        if((r.arche==='arm' || r.arche==='rover') && countArche('ai', r.arche, null) > 0){
          score += 4;
        }
        actions.push({type:'robot', card:r, score});
      });
      
      // Modul-Optionen — bewerte für jedes Modul × jedes eigene Robot-Ziel
      if(me.field.robots.length){
        mods.forEach(m=>{
          me.field.robots.forEach(target=>{
            let score = 0;
            // Buff-Module: Wert = Buff × Roboter-Stats
            if(m.effect?.atk) score += m.effect.atk * (currentAtk(target) > 0 ? 4 : 1); // ATK auf Roboter mit ATK
            if(m.effect?.hp) score += m.effect.hp * 2;
            // Defensiv-Module besonders auf wertvolle/bedrohte Ziele
            const isDefensive = ['shield2','shield3','shield4','shield5','thorns1','thorns2','reflect','bodyguard','armor1','survive','revive','returnHand','dodgeOnce','blockNext','heal1','heal2'].includes(m.key);
            if(isDefensive){
              const tgtValue = currentAtk(target) + currentHp(target);
              score += tgtValue * 0.5;
              if(inDanger) score += 5;
            }
            // Haste auf Roboter der gerade gesummoned wurde
            if(m.key==='haste' && target.summonedTurn === state.turnNumber) score += 8;
            // Flying auf starken Angreifer wenn Spieler nahe Niederlage
            if(m.key==='flying' && nearVictory && currentAtk(target) >= 3) score += 12;
            // Combine nur wenn 2+ kleine Roboter da
            if(m.key==='combine'){
              const smalls = me.field.robots.filter(r=>r.cost<=2 && r.uid!==target.uid);
              if(smalls.length < 2) score -= 100;
              else score += 8;
            }
            score -= m.cost * 0.5;
            actions.push({type:'module', card:m, target, score});
          });
        });
      }
      
      if(!actions.length) break;
      actions.sort((a,b)=>b.score - a.score);
      const best = actions[0];
      if(best.score < 0) break; // nichts Sinnvolles spielbar
      
      let played = false;
      if(best.type === 'robot'){
        played = playCard('ai', best.card.uid);
      } else {
        played = playCard('ai', best.card.uid, best.target.uid);
      }
      if(!played) break;
    }
  } finally {
    soundEnabled = _se;
  }
  
  // Phase 3: Angriffe — UID-tracking statt Index
  // Sammle einmal alle Angreifer-UIDs, hake jeden ab nach erfolgreichem Angriff
  const _attackerQueue = state.players.ai.field.robots.map(r=>r.uid);
  setTimeout(()=>aiAttackPhase(_attackerQueue, 0), 500);
}

function aiAttackPhase(queue, safety){
  if(state.gameOver){ aiTurnLock = false; aiPhaseLock = false; return; }
  if(state.turn !== 'ai'){ aiTurnLock = false; aiPhaseLock = false; return; }
  if(aiPhaseLock) return;
  aiPhaseLock = true;
  
  try {
    // Safety-Counter um Endlosschleifen zu verhindern (z.B. dualAttack-Bugs)
    if(safety > 30){
      console.warn('aiAttackPhase safety limit, beende KI-Zug');
      aiPhaseLock = false;
      aiTurnLock = false;
      setTimeout(()=>{ if(state.turn==='ai' && !state.gameOver){ log('— YOUR TURN —'); nextTurn(); } }, 300);
      return;
    }
    
    // Finde nächsten gültigen Angreifer aus der Queue
    let attacker = null;
    while(queue.length > 0){
      const uid = queue[0];
      const r = state.players.ai.field.robots.find(x=>x.uid===uid);
      if(r && canAttack(r)){ attacker = r; break; }
      queue.shift(); // Roboter nicht mehr da oder kann nicht angreifen → entfernen
    }
    
    // Keine Angreifer mehr → KI-Zug beenden
    if(!attacker){
      aiPhaseLock = false;
      aiTurnLock = false;
      if(state._aiWatchdog){ clearTimeout(state._aiWatchdog); state._aiWatchdog = null; }
      setTimeout(()=>{
        if(state.turn === 'ai' && !state.gameOver){
          log('— YOUR TURN —');
          nextTurn();
        }
      }, 400);
      return;
    }
    
    const targets = validTargets('ai');
    let target = null;
    
    // Berechne effektiven Schaden-Output für Face-Push-Entscheidung
    const me = state.players.ai;
    const enemy = state.players.me;
    const myAtk = currentAtk(attacker);
    const myHp = attacker.currentHpRemaining ?? currentHp(attacker);
    const hasFlying = attacker.modules?.some(m=>m.key==='flying') || attacker.key==='flying';
    const hasStealth = attacker.modules?.some(m=>m.key==='stealth') && !attacker.stealthUsed;
    const hasPierce = attacker.key==='pierce';
    
    // Wenn keine Blocker (face mode) ODER fliegt: hau ins Gesicht
    if(targets.mode === 'face' || (hasFlying && enemy.hp <= myAtk * 2)){
      target = 'face';
    } else if(targets.mode === 'taunt'){
      // Muss Taunt angreifen — wähle den schwächsten Taunt
      const sorted = targets.list.map(r=>{
        const eff = effectiveDamageTo(attacker, r);
        return {r, eff};
      }).sort((a,b)=>{
        // Bevorzuge den, den wir wirklich killen können
        const aKills = a.eff.dmgDealt >= (a.r.currentHpRemaining ?? currentHp(a.r));
        const bKills = b.eff.dmgDealt >= (b.r.currentHpRemaining ?? currentHp(b.r));
        if(aKills !== bKills) return aKills ? -1 : 1;
        return a.eff.dmgTaken - b.eff.dmgTaken;
      });
      target = sorted[0].r.uid;
    } else if(targets.list.length > 0){
      // Volle taktische Bewertung jedes möglichen Ziels
      const cands = targets.list.map(r=>{
        const eff = effectiveDamageTo(attacker, r);
        const defHp = r.currentHpRemaining ?? currentHp(r);
        const defAtk = currentAtk(r);
        const kills = eff.dmgDealt >= defHp;
        const survives = myHp > eff.dmgTaken;
        const targetValue = r.cost * 2 + r.atk + r.hp + (r.key ? 2 : 0);
        // Score
        let score = 0;
        if(kills && survives) score = 100 + targetValue;
        else if(kills) score = 60 + targetValue - 5; // Trade
        else if(survives) score = 30 + (eff.dmgDealt * 3) - (eff.dmgTaken * 2);
        else score = 5 + eff.dmgDealt - eff.dmgTaken * 3; // schlechter Deal
        // Spezielle Bedrohungen priorisieren
        if(r.key==='taunt' || r.modules?.some(m=>m.key==='taunt')) score += 5;
        if(r.key==='heal1' || r.modules?.some(m=>m.key==='heal1') || r.modules?.some(m=>m.key==='heal2')) score += 8; // Heiler killen
        if(r.key==='grows' || r.key==='learns') score += 6; // wachsende Bedrohung
        if(r.key==='tax') score += 10; // Knightscope killen, kostet uns sonst Energie
        // Wenn wir selbst sterben würden für nichts, lieber Face wenn möglich
        return {r, score, kills, survives, eff};
      });
      
      cands.sort((a,b)=>b.score - a.score);
      const best = cands[0];
      
      // Face-Push: wenn Spieler-HP ≤ unserer Gesamtschaden, lieber Face wenn freie Wahl
      // (in 'free' Mode geht Face nicht direkt, aber wenn alle Trades schlecht sind, wähle den schwächsten Trade)
      if(best.score < 10){
        // Alle Trades sind schlecht — finde den, der mindestens etwas Schaden macht ohne uns zu killen
        const safe = cands.find(c=>c.eff.dmgTaken < myHp);
        if(safe) target = safe.r.uid;
        else{
          // Skip diesen Angreifer ganz, lieber im Feld halten
          target = null;
        }
      } else {
        target = best.r.uid;
      }
    }
    
    aiPhaseLock = false;
    if(target){
      doAttack(attacker, target);
    } else {
      // Kein Ziel gefunden → diesen Roboter aus Queue entfernen damit nicht endlos
      queue.shift();
    }
    setTimeout(()=>aiAttackPhase(queue, (safety||0)+1), 750);
  } catch(err){
    console.error('aiAttackPhase Fehler:', err);
    aiPhaseLock = false;
    aiTurnLock = false;
    if(state.turn === 'ai' && !state.gameOver){
      setTimeout(()=>{ log('— YOUR TURN —'); nextTurn(); }, 200);
    }
  }
}

function log(msg){
  state.log.push({t:Date.now(),msg,fresh:true});
  state.log.slice(-6).forEach((l,i,a)=>{if(i<a.length-1)l.fresh=false;});
  if(state.log.length>40) state.log.shift();
}

function toast(msg, kind='info'){
  const el = document.createElement('div');
  el.className = 'toast '+kind;
  el.textContent = msg;
  document.getElementById('toast-layer').appendChild(el);
  if(kind==='bad' || kind==='warn') SFX.error();
  const duration = (kind==='bad'||kind==='warn') ? 2200 : 1800;
  setTimeout(()=>{el.style.opacity='0';el.style.transform='scale(.92)';el.style.transition='opacity .3s, transform .3s';setTimeout(()=>el.remove(),300);}, duration);
}

function renderCardHtml(card, opts={}){
  const {face='up', context='hand', uid=card.uid, extraCls=''} = opts;
  if(face==='down'){
    return `<div class="card back ${extraCls}"></div>`;
  }
  const cls = `card card-${card.type} ${extraCls}`;
  let art='';
  if(card.type==='robot'){
    // Spezifische Roboter-SVG bevorzugen, sonst auf Archetyp-Vorlage zurückgreifen
    if(card.id && ART_ROBOT[card.id]){
      art = ART_ROBOT[card.id]({...card.c,id:card.uid});
    } else {
      art = ART[card.arche] ? ART[card.arche]({...card.c,id:card.uid}) : '';
    }
  } else if(card.type==='battery'){
    if(card.id && ART_BATTERY_SPECIFIC[card.id]){
      art = ART_BATTERY_SPECIFIC[card.id]({...card.c,id:card.uid});
    } else {
      art = ART_BATTERY(card.c, Math.min(5,card.energy));
    }
  } else if(card.type==='module'){
    if(card.id && ART_MODULE_SPECIFIC[card.id]){
      art = ART_MODULE_SPECIFIC[card.id]({...card.c,id:card.uid});
    } else {
      art = ART_MODULE({...card.c,id:card.uid}, card.sym||'⊕');
    }
  }
  let stats='';
  if(card.type==='robot'){
    const curAtk = card.currentHpRemaining !== undefined ? currentAtk(card) : card.atk;
    const curHp = card.currentHpRemaining !== undefined ? card.currentHpRemaining : card.hp;
    const baseAtk = card.atk;
    const baseHp = card.hp;
    const atkMod = currentAtk(card)-baseAtk;
    stats = `<div class="card-stats">
      <span class="atk">⚔ ${currentAtk(card)}</span>
      <span class="hp">♥ ${curHp}</span>
    </div>`;
  } else if(card.type==='battery'){
    // Wenn Batterie auf Feld: zeige charge/maxCharge, sonst Basis-energy
    if(card.maxCharge !== undefined){
      const lowCls = card.charge <= 1 ? 'low' : '';
      stats = `<div class="card-stats"><span class="energy-value ${lowCls}">⚡ ${card.charge}/${card.maxCharge}${card.renewable?' ↻':''}</span></div>`;
    } else {
      stats = `<div class="card-stats"><span class="energy-value">⚡ ${card.energy}${card.renewable?' ↻':''}</span></div>`;
    }
  } else if(card.type==='module'){
    stats = `<div class="card-stats"><span class="module-tag">MOD</span></div>`;
  }
  const costBadge = card.type==='robot' || card.type==='module' 
    ? `<div class="card-cost">${card.cost}</div>` 
    : '';
  const moduleChips = (card.type==='robot' && card.modules?.length) 
    ? `<div class="module-indicator">${card.modules.map(m=>{
        const isDef = ['shield2','shield3','shield4','shield5','thorns1','thorns2','reflect','bodyguard','armor1','survive','revive','returnHand','dodgeOnce','blockNext','untarget','heal1','heal2'].includes(m.key);
        return `<span class="module-chip ${isDef?'def':''}">${m.sym||'⊕'}</span>`;
      }).join('')}</div>` 
    : '';
  // Defensive Anzeige-Chips
  const shieldChip = (card.type==='robot' && (card.shield||0)>0) ? `<div class="shield-chip">◯${card.shield}</div>` : '';
  const thornChip = (card.type==='robot' && (card.thorns||0)>0) ? `<div class="thorn-chip">✦${card.thorns}</div>` : '';
  let readyChips = '';
  if(card.type==='robot'){
    const ready = [];
    if(card.reflectReady) ready.push('◈');
    if(card.dodgeReady) ready.push('☁');
    if(card.blockReady) ready.push('▨');
    if(card.untargetUntil && card.untargetUntil > (state?.turnNumber||0)) ready.push('◑');
    if(ready.length) readyChips = `<div class="ready-chip">${ready.join(' ')}</div>`;
  }
  // Klassen-Additions für Glow
  let extraStateCls = '';
  if(card.type==='robot'){
    if((card.shield||0)>0) extraStateCls += ' shielded';
    if((card.thorns||0)>0) extraStateCls += ' thorny';
    if(card.untargetUntil && card.untargetUntil > (state?.turnNumber||0)) extraStateCls += ' untargetable';
  }
  
  // Ability-Text: bei key ABIL_LONG bevorzugen (ausführlich), sonst Kurz-Text
  let abilityText = card.ability || '';
  if(card.key && ABIL_LONG[card.key]){
    // Kurztext als fetter Lead + längere Erklärung
    abilityText = `<span class="ability-lead">${card.ability||''}</span> <span class="ability-detail">${ABIL_LONG[card.key]}</span>`;
  }
  
  // Lore-Tag (kurzer Beschreibungstext, falls vorhanden)
  const lore = (card.id && CARD_LORE[card.id]) ? CARD_LORE[card.id] : null;
  const loreTag = lore ? `<div class="card-lore">${lore.tag}</div>` : '';
  
  return `<div class="${cls}${extraStateCls}" data-uid="${uid}" data-context="${context}" data-cardid="${card.id||''}">
    ${costBadge}
    <div class="card-maker">${card.maker||card.type}</div>
    <div class="card-art">${art}</div>
    <div class="card-name">${card.name}</div>
    ${loreTag}
    <div class="card-ability">${abilityText}</div>
    ${moduleChips}
    ${shieldChip}
    ${thornChip}
    ${readyChips}
    ${stats}
  </div>`;
}

        </div>
        <div class="middle-right-col">
          ${state.turn==='me' 
            ? `<button class="btn btn-primary end-turn" onclick="endTurn()">END TURN</button>` 
            : `<div style="font-family:var(--f-tech);font-size:13px;color:var(--accent3);padding:14px 18px;border:1px solid var(--accent3);background:var(--panel);min-width:140px;text-align:center">WAITING ...</div>`}
          <button class="btn btn-ghost" style="padding:8px 14px;font-size:11px;margin-top:8px" onclick="concede()">CONCEDE</button>
        </div>
      </div>
      
      <!-- ME -->
      <div class="player-zone me">
        <div class="field">
          <div class="field-row batteries" id="my-batts">
            ${me.field.batteries.map(b=>renderCardHtml(b,{context:'my-batt',extraCls:'mini'})).join('')}
          </div>
          <div class="field-row robots" id="my-robots">
            ${me.field.robots.map(r=>renderCardHtml(r,{context:'my-field',extraCls:'small '+(state.selected===r.uid?'selected':'')+(canAttack(r) && state.turn==='me'?' haste-ready':'')})).join('')}
          </div>
        </div>
        <div class="hand me" id="my-hand">
          ${me.hand.map(c=>renderCardHtml(c,{context:'my-hand',extraCls:(canPlayCard('me',c)?'':'dimmed')+' '+(state.pendingModule===c.uid?'selected':'')})).join('')}
        </div>
        <div class="zone-header">
          <span class="who">▼ ${me.name}</span>
          <div class="stats-row">
            <div class="stat-pill hp ${me.hp<=8?'low':''}"><span class="label">HP</span><span class="value">${me.hp}</span></div>
            <div class="stat-pill energy"><span class="label">⚡</span><span class="value">${myEnergy}/${myEnergyTotal}</span></div>
            <div class="stat-pill deck"><span class="label">DECK</span><span class="value">${me.deck.length}</span></div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('app').innerHTML = board;
  attachGameEvents();
  postRenderFx();
}

function isValidTarget(robot){
  if(state.turn !== 'me' || !state.selected) return false;
  const attacker = state.players.me.field.robots.find(r=>r.uid===state.selected);
  if(!attacker) return false;
  const targets = validTargets('me');
  return targets.list.some(t=>t.uid===robot.uid);
}

function attachGameEvents(){
  // Click eigene Handkarte: spielen (oder Modul-Targeting)
  document.querySelectorAll('[data-context="my-hand"]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(state.turn!=='me') return;
      const u = el.dataset.uid;
      const card = state.players.me.hand.find(c=>c.uid===u);
      if(!card) return;
      if(card.type==='module' && state.players.me.field.robots.length){
        state.pendingModule = u;
        toast('Select one of your robots','warn');
        render();
      } else {
        playCard('me', u);
      }
    });
  });
  
  // Click eigener Roboter: Attacker wählen ODER Modul-Ziel
  document.querySelectorAll('[data-context="my-field"]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(state.turn!=='me') return;
      const u = el.dataset.uid;
      if(state.pendingModule){
        playCard('me', state.pendingModule, u);
        return;
      }
      const robot = state.players.me.field.robots.find(r=>r.uid===u);
      if(!robot) return;
      if(!canAttack(robot)){
        if(robot.summonedTurn===state.turnNumber) toast('Cannot attack on summoning turn','warn');
        else if((robot.attackedThisTurn||0)>0) toast('Already attacked this turn','warn');
        else toast('Cannot attack','warn');
        return;
      }
      state.selected = (state.selected===u) ? null : u;
      render();
    });
  });
  
  // Click gegnerischer Roboter: Ziel für Angriff
  document.querySelectorAll('[data-context="ai-field"]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(state.turn!=='me' || !state.selected) return;
      const u = el.dataset.uid;
      const attacker = state.players.me.field.robots.find(r=>r.uid===state.selected);
      const target = state.players.ai.field.robots.find(r=>r.uid===u);
      if(attacker && target){
        doAttack(attacker, u);
        state.selected = null;
      }
    });
  });
  
  // Click auf leeren Bereich von Gegner-Feld für Face-Attack
  const aiRobots = document.getElementById('ai-robots');
  if(aiRobots){
    aiRobots.addEventListener('click',e=>{
      if(e.target !== aiRobots) return;
      if(state.turn!=='me' || !state.selected) return;
      const targets = validTargets('me');
      if(targets.mode === 'face'){
        const attacker = state.players.me.field.robots.find(r=>r.uid===state.selected);
        if(attacker){doAttack(attacker, 'face'); state.selected = null;}
      } else {
        toast('You must attack a robot','bad');
      }
    });
  }
  
  // Rechtsklick auf Handkarte: Modul-Ziel abbrechen
  document.addEventListener('contextmenu',e=>{
    if(state.pendingModule){
      e.preventDefault();
      state.pendingModule = null;
      render();
    }
  });
  
  // Tooltip-Handler für alle sichtbaren Karten
  attachTooltipHandlers();
}

let tooltipEl = null;
let tooltipCard = null;
function showTooltip(card, x, y){
  const layer = document.getElementById('tooltip-layer');
  if(!layer) return;
  if(!tooltipEl){
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'card-tooltip';
    layer.appendChild(tooltipEl);
  }
  // Stats-Zeile je nach Typ
  let statsLine = '';
  let synergyInfo = '';
  if(card.type === 'robot'){
    const ca = currentAtk(card);
    const maxH = currentHp(card);
    const curH = card.currentHpRemaining ?? maxH;
    const shield = card.shield||0;
    const thorns = card.thorns||0;
    const armor = card.armor||0;
    // Berechne Basis-Stats vs. tatsächliche Stats für Synergie-Hinweis
    const owner = findOwnerOfRobot(card);
    let baseAtk = card.atk;
    (card.modules||[]).forEach(m=>{if(m.effect?.atk) baseAtk += m.effect.atk});
    (card.temporaryBuffs||[]).forEach(b=>{if(b.atk) baseAtk += b.atk});
    let baseHp = card.hp;
    (card.modules||[]).forEach(m=>{if(m.effect?.hp) baseHp += m.effect.hp});
    (card.temporaryBuffs||[]).forEach(b=>{if(b.hp) baseHp += b.hp});
    const atkDiff = ca - baseAtk;
    const hpDiff = maxH - baseHp;
    const atkStr = atkDiff > 0 ? `ATK ${ca} <span style="color:var(--success);font-size:9px">(+${atkDiff})</span>` :
                   atkDiff < 0 ? `ATK ${ca} <span style="color:var(--danger);font-size:9px">(${atkDiff})</span>` : `ATK ${ca}`;
    const hpStr = hpDiff > 0 ? `HP ${curH}/${maxH} <span style="color:var(--success);font-size:9px">(+${hpDiff})</span>` : `HP ${curH}/${maxH}`;
    const parts = [`<span class="s-atk">${atkStr}</span>`, `<span class="s-hp">${hpStr}</span>`];
    if(shield>0) parts.push(`<span style="color:#6dc8ff">◯${shield}</span>`);
    if(thorns>0) parts.push(`<span style="color:#b86dff">✦${thorns}</span>`);
    if(armor>0) parts.push(`<span style="color:#aaa">Armor ${armor}</span>`);
    if(card.cost !== undefined) parts.push(`<span class="s-en">${card.cost}⚡</span>`);
    statsLine = `<div class="tt-stats">${parts.join('')}</div>`;
    
    // Synergie-Info wenn Karte auf Feld ist
    if(owner && (atkDiff !== 0 || hpDiff !== 0)){
      const reasons = explainSynergies(card, owner);
      if(reasons.length){
        synergyInfo = `<div class="tt-detail" style="border-color:var(--success);color:var(--success)"><strong>↑ Aktive Boni:</strong><br>${reasons.join('<br>')}</div>`;
      }
    }
  } else if(card.type === 'battery'){
    let txt = `<span class="s-en">⚡ ${card.charge ?? card.energy}/${card.maxCharge ?? card.energy}</span>`;
    if(card.renewable) txt += `<span style="color:var(--success)">↻ +${card.rechargeRate}/Zug</span>`;
    statsLine = `<div class="tt-stats">${txt}</div>`;
  } else if(card.type === 'module'){
    const effParts = [];
    if(card.effect?.atk) effParts.push(`<span class="s-atk">+${card.effect.atk} ATK</span>`);
    if(card.effect?.hp) effParts.push(`<span class="s-hp">+${card.effect.hp} HP</span>`);
    effParts.push(`<span class="s-en">${card.cost}⚡</span>`);
    statsLine = `<div class="tt-stats">${effParts.join('')}</div>`;
  }
  // Detail: ABIL_LONG[key] oder Ability-Text als Fallback
  const longDesc = card.key && ABIL_LONG[card.key] ? ABIL_LONG[card.key] : (card.ability || '');
  let modulesList = '';
  if(card.type === 'robot' && card.modules?.length){
    modulesList = `<div class="tt-detail">Modules: ${card.modules.map(m=>m.name).join(', ')}</div>`;
  }
  // Lore: Hintergrund-Info zum echten Roboter / zur Batterie-Technologie
  const loreBlock = card.lore ? `<div class="tt-lore"><span class="tt-lore-label">// REAL-WORLD</span>${card.lore}</div>` : '';
  tooltipEl.innerHTML = `
    <div class="tt-head">${card.name}</div>
    <div class="tt-sub">${card.maker||card.type} · ${card.type==='robot'?'ROBOT':card.type==='battery'?'BATTERY':'MODULE'}${card.arche?' · '+card.arche.replace('_',' '):''}</div>
    ${statsLine}
    ${loreBlock}
    <div class="tt-ability">${card.ability||''}</div>
    <div class="tt-detail">${longDesc}</div>
    ${synergyInfo}
    ${modulesList}
  `;
  // Positionierung: wenn zu weit rechts, links vom Cursor; wenn zu weit unten, darüber
  const vw = window.innerWidth, vh = window.innerHeight;
  const tw = 280, th = 260;
  let tx = x + 20, ty = y + 20;
  if(tx + tw > vw) tx = x - tw - 20;
  if(ty + th > vh) ty = y - th - 20;
  tx = Math.max(8, tx);
  ty = Math.max(8, ty);
  tooltipEl.style.left = tx+'px';
  tooltipEl.style.top = ty+'px';
  tooltipEl.style.display = 'block';
}
function hideTooltip(){
  if(tooltipEl) tooltipEl.style.display = 'none';
  tooltipCard = null;
  document.querySelectorAll('.card.synergy-target').forEach(t=>t.classList.remove('synergy-target'));
  if(_tooltipAutoCloseTimer){ clearTimeout(_tooltipAutoCloseTimer); _tooltipAutoCloseTimer = null; }
}
function attachTooltipHandlers(){
  document.querySelectorAll('.card[data-cardid]').forEach(el=>{
    if(el.classList.contains('back')) return;
    
    // Helper: Karte zur aktuellen UID/ID finden
    function getLiveCard(){
      const cid = el.dataset.cardid;
      const uid = el.dataset.uid;
      let card = null;
      for(const who of ['me','ai']){
        const p = state?.players?.[who];
        if(!p) continue;
        card = card || p.hand?.find(c=>c.uid===uid);
        card = card || p.field?.robots?.find(c=>c.uid===uid);
        card = card || p.field?.batteries?.find(c=>c.uid===uid);
      }
      if(!card) card = getCard(cid);
      return card;
    }
    
    function showSynergyHighlight(card){
      const ctx = el.dataset.context;
      if(ctx === 'my-hand' && card?.type === 'robot'){
        const targets = previewSynergyTargets(card, 'me');
        targets.forEach(targetUid=>{
          const tEl = document.querySelector(`.card[data-uid="${targetUid}"]`);
          if(tEl) tEl.classList.add('synergy-target');
        });
      }
    }
    function clearHighlights(){
      document.querySelectorAll('.card.synergy-target').forEach(t=>t.classList.remove('synergy-target'));
    }
    
    // === Maus-Events (Desktop) ===
    el.addEventListener('mouseenter', e=>{
      const card = getLiveCard();
      if(card){
        tooltipCard = card;
        showTooltip(card, e.clientX, e.clientY);
      }
      showSynergyHighlight(card);
    });
    el.addEventListener('mousemove', e=>{
      if(tooltipEl && tooltipCard){
        const vw = window.innerWidth, vh = window.innerHeight;
        const tw = 280, th = 260;
        let tx = e.clientX + 20, ty = e.clientY + 20;
        if(tx + tw > vw) tx = e.clientX - tw - 20;
        if(ty + th > vh) ty = e.clientY - th - 20;
        tx = Math.max(8, tx); ty = Math.max(8, ty);
        tooltipEl.style.left = tx+'px';
        tooltipEl.style.top = ty+'px';
      }
    });
    el.addEventListener('mouseleave', ()=>{
      hideTooltip();
      clearHighlights();
    });
    
    // === Touch-Events (Mobile) ===
    // Long-Press (500ms) zeigt Tooltip, Tap spielt Karte (normale click-Handler)
    let touchTimer = null;
    let touchStartXY = null;
    let longPressed = false;
    
    el.addEventListener('touchstart', e=>{
      longPressed = false;
      const t = e.touches[0];
      touchStartXY = {x:t.clientX, y:t.clientY};
      touchTimer = setTimeout(()=>{
        longPressed = true;
        const card = getLiveCard();
        if(card){
          tooltipCard = card;
          // Tooltip zentriert zeigen (via CSS auf Mobile als Bottom-Sheet)
          showTooltip(card, t.clientX, t.clientY);
          showSynergyHighlight(card);
          // Haptisches Feedback falls verfügbar
          if(navigator.vibrate) navigator.vibrate(30);
        }
      }, 450);
    }, {passive:true});
    
    el.addEventListener('touchmove', e=>{
      // Wenn Finger zu weit weg wandert, Long-Press abbrechen
      if(touchTimer && touchStartXY){
        const t = e.touches[0];
        const dx = t.clientX - touchStartXY.x;
        const dy = t.clientY - touchStartXY.y;
        if(Math.abs(dx) > 10 || Math.abs(dy) > 10){
          clearTimeout(touchTimer);
          touchTimer = null;
        }
      }
    }, {passive:true});
    
    el.addEventListener('touchend', e=>{
      if(touchTimer){ clearTimeout(touchTimer); touchTimer = null; }
      if(longPressed){
        // War Long-Press: Tooltip offen lassen, Click nicht auslösen
        e.preventDefault();
        e.stopPropagation();
        // Auto-close nach 4s falls User nichts mehr tut
        if(_tooltipAutoCloseTimer) clearTimeout(_tooltipAutoCloseTimer);
        _tooltipAutoCloseTimer = setTimeout(()=>{ hideTooltip(); }, 4000);
      }
      // Bei normalem Tap: click-Handler der Karte läuft normal weiter
    });
    
    el.addEventListener('touchcancel', ()=>{
      if(touchTimer){ clearTimeout(touchTimer); touchTimer = null; }
      hideTooltip();
      clearHighlights();
    });
  });
}

// === Globale Tooltip-Schliesser — NUR EINMAL registrieren! ===
let _tooltipGlobalHandlersAttached = false;
let _tooltipAutoCloseTimer = null;
function attachGlobalTooltipClosers(){
  if(_tooltipGlobalHandlersAttached) return;
  _tooltipGlobalHandlersAttached = true;
  
  // Tap außerhalb einer Karte schließt Tooltip
  document.addEventListener('touchstart', e=>{
    if(!e.target.closest('.card')){
      hideTooltip();
    }
  }, {passive:true});
  
  // Click aufs Tooltip selbst schließt es
  document.addEventListener('click', e=>{
    if(e.target.closest('.card-tooltip')){
      hideTooltip();
    }
  }, true);
  
  // ESC schließt Tooltip
  document.addEventListener('keydown', e=>{
    if(e.key === 'Escape') hideTooltip();
  });
}
attachGlobalTooltipClosers();
