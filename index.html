<title>BOT.DUEL v0.4 — Roboter Kartenspiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090f;
  --bg2:#0e1422;
  --panel:#141b2a;
  --panel2:#1a2235;
  --border:#2a3447;
  --border-hot:#3d4a65;
  --accent:#ffa726;
  --accent2:#00d4ff;
  --accent3:#ff3a7a;
  --danger:#ff3a3a;
  --success:#00ff88;
  --text:#e4e8f1;
  --dim:#7a8599;
  --deep-dim:#4a5366;
  --f-display:'Orbitron',sans-serif;
  --f-tech:'Share Tech Mono',monospace;
  --f-body:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f-body);overflow:hidden;user-select:none}
body{
  background:
    radial-gradient(ellipse at top,rgba(0,212,255,.04),transparent 60%),
    radial-gradient(ellipse at bottom,rgba(255,167,38,.04),transparent 60%),
    linear-gradient(180deg,#07090f 0%,#0b0f18 100%);
  background-attachment:fixed;
  /* Mobile: kein Pull-to-Refresh, keine Selektion, kein Doppeltap-Zoom */
  overscroll-behavior:none;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
/* Inputs/Selects bleiben selektierbar fuer Deckbuilder-Suche */
input,select,textarea{
  -webkit-user-select:text;
  user-select:text;
  touch-action:auto;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px) 0 0/40px 40px,
    linear-gradient(0deg,rgba(255,255,255,.015) 1px,transparent 1px) 0 0/40px 40px;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0,rgba(0,0,0,.15) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:overlay;opacity:.5;
}
#app{position:relative;z-index:10;height:100vh;width:100vw}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
h1,h2,h3{font-family:var(--f-display);letter-spacing:.05em}

/* ===== TITLE SCREEN ===== */
.title-screen{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:40px;text-align:center;position:relative;
}
.title-logo{
  font-family:var(--f-display);font-weight:900;font-size:clamp(48px,8vw,120px);
  letter-spacing:-.02em;line-height:.9;
  background:linear-gradient(180deg,#fff 0%,#ffa726 50%,#ff3a7a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  position:relative;text-shadow:0 0 80px rgba(255,167,38,.2);
}
.title-logo::after{
  content:'';display:block;width:60%;height:2px;margin:8px auto 0;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.title-sub{
  font-family:var(--f-tech);font-size:13px;color:var(--accent2);
  letter-spacing:.5em;text-transform:uppercase;opacity:.8;
}
.title-version{
  font-family:var(--f-tech);font-size:10px;color:var(--deep-dim);letter-spacing:.3em;
}
.btn{
  font-family:var(--f-display);font-weight:700;font-size:14px;letter-spacing:.15em;
  text-transform:uppercase;padding:16px 40px;
  background:var(--panel);color:var(--text);
  border:1px solid var(--border-hot);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  transition:all .2s;position:relative;
}
.btn:hover{background:var(--panel2);border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent) 0%,#ff6600 100%);color:#000;border:none;
  box-shadow:0 0 30px rgba(255,167,38,.3);
}
.btn-primary:hover{background:linear-gradient(135deg,#ffb84a,#ff7a1a);color:#000;box-shadow:0 0 50px rgba(255,167,38,.5)}
.btn-ghost{background:transparent;border:1px solid var(--border)}
.btn-group{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.title-credits{position:absolute;bottom:20px;font-family:var(--f-tech);font-size:10px;color:var(--deep-dim);letter-spacing:.2em}

/* ===== GAME BOARD ===== */
*,*::before,*::after{box-sizing:border-box}
.board{
  height:100vh;height:100dvh;width:100vw;max-width:100vw;overflow:hidden;
  display:grid;grid-template-rows:1fr auto 1fr;gap:0;
  background:
    radial-gradient(ellipse at center,rgba(0,212,255,.03),transparent 70%);
}
.player-zone{padding:12px 20px;display:flex;flex-direction:column;gap:8px;position:relative;min-width:0;max-width:100%;min-height:0;overflow:hidden}
.player-zone.opponent{border-bottom:1px solid var(--border);justify-content:flex-start}
.player-zone.me{border-top:1px solid var(--border);justify-content:flex-end}
.zone-header{
.zone-header{
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--f-tech);font-size:11px;letter-spacing:.2em;color:var(--dim);
  flex-wrap:wrap;gap:6px;min-width:0;
}
.zone-header .who{color:var(--accent2)}
.opponent .zone-header .who{color:var(--accent3)}
.stats-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;min-width:0}
.stat-pill{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--panel);border:1px solid var(--border);
  font-family:var(--f-tech);font-size:12px;
}
.stat-pill.hp{color:var(--success);border-color:rgba(0,255,136,.3)}
.stat-pill.hp.low{color:var(--danger);border-color:rgba(255,58,58,.4)}
.stat-pill.energy{color:var(--accent);border-color:rgba(255,167,38,.3)}
.stat-pill.deck{color:var(--dim)}
.stat-pill .label{color:var(--dim);font-size:10px}
.stat-pill .value{font-weight:600}

.field{display:grid;grid-template-rows:auto auto;gap:6px;min-height:280px;min-width:0;max-width:100%;overflow:hidden}
.field-row{
  display:flex;gap:8px;padding:4px 0;min-height:140px;align-items:flex-start;
  min-width:0;max-width:100%;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  scroll-snap-type:x proximity;
}
.field-row > .card{flex-shrink:0;scroll-snap-align:start}
.field-row.batteries{min-height:108px;opacity:.95}
.field-label{
  font-family:var(--f-tech);font-size:9px;color:var(--deep-dim);letter-spacing:.2em;
  writing-mode:vertical-rl;transform:rotate(180deg);align-self:stretch;padding:4px 2px;
  flex-shrink:0;
}

.hand{
  display:flex;gap:8px;padding:10px 20px;min-height:232px;align-items:flex-end;
  min-width:0;max-width:100%;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  scroll-snap-type:x proximity;
}
.hand > .card{flex-shrink:0;scroll-snap-align:center}
.hand.opponent{min-height:80px;padding:6px 20px}

.middle{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;gap:20px;padding:14px 22px;position:relative;
  min-height:130px;
  background:
    linear-gradient(180deg,rgba(0,212,255,.03),rgba(255,58,122,.03)),
    linear-gradient(90deg,rgba(0,0,0,.3),transparent 20%,transparent 80%,rgba(0,0,0,.3));
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.middle::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 24px,rgba(255,255,255,.02) 24px 25px);
  pointer-events:none;
}
.middle-left-col{display:flex;flex-direction:column;gap:8px;align-items:flex-start;z-index:2}
.middle-center{display:flex;flex-direction:column;gap:8px;align-items:center;z-index:2;min-width:0;width:100%}
.middle-right-col{display:flex;flex-direction:column;gap:8px;align-items:flex-end;z-index:2}
.turn-indicator{
  font-family:var(--f-display);font-weight:700;font-size:18px;letter-spacing:.3em;
  padding:10px 26px;border:1px solid var(--border);background:var(--panel);
  text-transform:uppercase;position:relative;
}
.turn-indicator.mine{color:var(--accent);border-color:var(--accent);box-shadow:0 0 25px rgba(255,167,38,.25)}
.turn-indicator.theirs{color:var(--accent3);border-color:var(--accent3);animation:ai-pulse 1.2s infinite}
@keyframes ai-pulse{0%,100%{box-shadow:0 0 15px rgba(255,58,122,.2)}50%{box-shadow:0 0 35px rgba(255,58,122,.5)}}
.battle-log{
  font-family:var(--f-tech);font-size:13px;color:var(--dim);
  max-height:92px;overflow-y:auto;text-align:center;min-height:72px;
  width:100%;max-width:720px;
  padding:6px 12px;background:rgba(0,0,0,.35);border:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.battle-log .entry{opacity:.4;font-size:12px;line-height:1.3;transition:opacity .3s}
.battle-log .entry.new{opacity:1;color:var(--text)}
.battle-log .entry:last-child{opacity:1;color:var(--text);font-size:13px}
.attacker-info{
  font-family:var(--f-tech);font-size:12px;color:var(--accent);letter-spacing:.15em;
  padding:6px 12px;background:rgba(255,167,38,.1);border:1px solid var(--accent);
  animation:ai-pulse 1.5s infinite;text-align:center;
}
.end-turn{min-width:140px}

/* ===== CARDS ===== */
.card{
  width:156px;height:224px;
  background:linear-gradient(180deg,var(--panel2) 0%,var(--panel) 100%);
  border:1px solid var(--border);position:relative;
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  flex-shrink:0;cursor:pointer;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.card:hover{transform:translateY(-10px);z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.6)}
.card.selected{border-color:var(--accent);box-shadow:0 0 35px rgba(255,167,38,.55);transform:translateY(-14px)}
.card.attacking{border-color:var(--danger);animation:shake .3s}
.card.dimmed{opacity:.4;pointer-events:none}
.card.small{width:128px;height:184px}
.card.mini{width:74px;height:104px;cursor:default}
.card.mini:hover{transform:none;box-shadow:none}
.card.mini .card-ability{display:none}
.card.mini .card-name{font-size:8px;padding:2px 4px;min-height:16px}
.card.mini .card-art{height:50px}
.card.mini .card-stats{padding:2px 4px;font-size:9px}
.card.mini .card-maker{display:none}
.card.mini .card-cost{width:18px;height:18px;font-size:10px;top:3px;left:3px}
.card.back{
  background:
    repeating-linear-gradient(45deg,var(--panel) 0 10px,var(--panel2) 10px 20px);
  display:flex;align-items:center;justify-content:center;
}
.card.back::after{
  content:'◊';font-size:38px;color:var(--accent2);opacity:.3;
  font-family:var(--f-display);
}
.card-robot{border-top:3px solid var(--accent2)}
.card-battery{border-top:3px solid var(--accent)}
.card-module{border-top:3px solid var(--accent3)}
.card-type-band{
  position:absolute;top:0;left:0;right:0;height:3px;
}
.card-cost{
  position:absolute;top:7px;left:7px;width:26px;height:26px;
  background:var(--accent);color:#000;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);font-weight:700;font-size:14px;z-index:2;
  box-shadow:0 0 10px rgba(255,167,38,.4);
}
.card-battery .card-cost{background:var(--accent);display:none}
.card-module .card-cost{background:var(--accent3);color:#fff}
.card-maker{
  position:absolute;top:9px;right:9px;font-family:var(--f-tech);font-size:8px;
  color:var(--deep-dim);letter-spacing:.12em;text-transform:uppercase;z-index:2;
  max-width:78px;text-align:right;line-height:1.1;
}
.card-art{
  height:96px;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse at center,rgba(0,212,255,.08),transparent 70%),
    linear-gradient(180deg,#0a0f1a 0%,#141b2a 100%);
  border-bottom:1px solid var(--border);margin-top:3px;position:relative;overflow:hidden;
}
.card-art::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(255,255,255,.02) 2px 3px);
  pointer-events:none;
}
.card-battery .card-art{
  background:
    radial-gradient(ellipse at center,rgba(255,167,38,.1),transparent 70%),
    linear-gradient(180deg,#0f0a05 0%,#1a1408 100%);
}
.card-module .card-art{
  background:
    radial-gradient(ellipse at center,rgba(255,58,122,.08),transparent 70%),
    linear-gradient(180deg,#0f0814 0%,#1a0e1f 100%);
}
.card-art svg{width:100%;height:100%;max-width:110px;max-height:92px}
.card.small .card-art{height:76px}
.card.small .card-art svg{max-width:90px;max-height:72px}
.card-name{
  padding:5px 8px 3px;font-family:var(--f-display);font-weight:700;font-size:12px;
  letter-spacing:.02em;line-height:1.15;min-height:28px;
}
.card.small .card-name{font-size:11px;padding:4px 6px 2px;min-height:24px}
.card-lore{
  padding:1px 8px 3px;font-family:var(--f-tech);font-size:9px;
  color:var(--accent);letter-spacing:.05em;line-height:1.2;
  font-style:italic;opacity:.85;text-transform:uppercase;
  border-bottom:1px dashed rgba(255,167,38,.2);margin-bottom:2px;
}
.card.small .card-lore{font-size:8px;padding:1px 6px 2px}
.card-ability{
  flex:1;padding:4px 8px;font-family:var(--f-body);font-size:11px;
  color:var(--dim);line-height:1.3;overflow:hidden;
}
.card.small .card-ability{font-size:10px;padding:3px 6px;line-height:1.25}
.card-ability .ability-lead{color:var(--text);font-weight:600;display:block;margin-bottom:2px}
.card-ability .ability-detail{color:var(--dim);font-size:10px;line-height:1.25}
.card.small .card-ability .ability-detail{font-size:9px}
.card-stats{
  display:flex;justify-content:space-between;padding:5px 8px;
  font-family:var(--f-display);font-weight:700;font-size:13px;
  border-top:1px solid var(--border);background:rgba(0,0,0,.35);
}
.card.small .card-stats{padding:4px 7px;font-size:12px}
.card-stats .atk{color:var(--danger)}
.card-stats .hp{color:var(--success)}
.card-stats .energy-value{color:var(--accent);width:100%;text-align:center}
.card-stats .module-tag{color:var(--accent3);width:100%;text-align:center;font-size:11px;letter-spacing:.2em}

.card.exhausted{transform:rotate(8deg);opacity:.7}
.card.exhausted:hover{transform:rotate(8deg) translateY(-4px)}
.card.haste-ready{box-shadow:0 0 15px rgba(0,255,136,.3)}
.card.targetable{border-color:var(--danger);animation:pulse-red 1s infinite}
.card.taunt-active{border-color:var(--accent3);box-shadow:0 0 15px rgba(255,58,122,.4)}
.card.shielded{box-shadow:0 0 18px rgba(109,200,255,.5);border-color:#6dc8ff}
.card.thorny{box-shadow:0 0 15px rgba(184,109,255,.4);border-color:#b86dff}
.card.untargetable{opacity:.55;filter:blur(.4px) saturate(.5);box-shadow:0 0 15px rgba(170,170,255,.3)}
.card.synergy-target{
  box-shadow:0 0 25px rgba(0,255,136,.7),inset 0 0 12px rgba(0,255,136,.3);
  border-color:#00ff88;
  animation:syn-pulse 1.2s infinite;
}
@keyframes syn-pulse{
  0%,100%{box-shadow:0 0 25px rgba(0,255,136,.7),inset 0 0 12px rgba(0,255,136,.3)}
  50%{box-shadow:0 0 40px rgba(0,255,136,.9),inset 0 0 20px rgba(0,255,136,.5)}
}
.card.bodyguard-active{box-shadow:0 0 15px rgba(109,200,255,.3)}
.card .shield-chip{position:absolute;top:30px;right:4px;font-family:var(--f-tech);font-size:10px;color:#fff;background:#0077cc;padding:2px 5px;border:1px solid #6dc8ff;z-index:4;line-height:1}
.card .thorn-chip{position:absolute;top:30px;left:4px;font-family:var(--f-tech);font-size:10px;color:#fff;background:#7733aa;padding:2px 5px;border:1px solid #b86dff;z-index:4;line-height:1}
.card .ready-chip{position:absolute;bottom:30px;right:4px;font-family:var(--f-tech);font-size:9px;color:#fff;background:rgba(0,0,0,.7);padding:1px 4px;border:1px solid var(--accent2);z-index:3}
.card .module-indicator{position:absolute;bottom:32px;left:4px;right:4px;display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-start;pointer-events:none}
.module-chip{font-family:var(--f-tech);font-size:7px;padding:1px 3px;background:rgba(255,58,122,.3);border:1px solid var(--accent3);color:#fff}
.module-chip.def{background:rgba(109,200,255,.3);border-color:#6dc8ff}
.energy-value.low{color:#ff6666}

/* Tooltip */
.card-tooltip{
  position:fixed;z-index:2500;width:260px;background:var(--panel);
  border:1px solid var(--accent);padding:12px;font-family:var(--f-body);
  font-size:12px;line-height:1.4;color:var(--text);pointer-events:none;
  box-shadow:0 10px 40px rgba(0,0,0,.85);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.card-tooltip .tt-head{font-family:var(--f-display);font-weight:700;font-size:14px;color:var(--accent);letter-spacing:.05em;margin-bottom:2px}
.card-tooltip .tt-sub{font-family:var(--f-tech);font-size:10px;color:var(--dim);margin-bottom:8px;letter-spacing:.12em;text-transform:uppercase}
.card-tooltip .tt-stats{font-family:var(--f-tech);font-size:11px;padding:4px 6px;background:rgba(0,0,0,.4);border:1px solid var(--border);margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap}
.card-tooltip .tt-stats .s-atk{color:var(--danger)}
.card-tooltip .tt-stats .s-hp{color:var(--success)}
.card-tooltip .tt-stats .s-en{color:var(--accent)}
.card-tooltip .tt-ability{color:var(--text);margin-bottom:8px}
.card-tooltip .tt-detail{color:var(--dim);font-size:11px;border-top:1px solid var(--border);padding-top:6px;font-style:italic}
.card-tooltip .tt-lore{
  font-size:11px;color:#b8c4d4;line-height:1.4;
  border-left:2px solid var(--accent);
  padding:4px 0 4px 8px;margin:6px 0;
  background:rgba(255,167,38,.04);
  font-style:normal;
}
.card-tooltip .tt-lore-label{
  display:block;font-family:var(--f-tech);font-size:8px;
  color:var(--accent);letter-spacing:.2em;margin-bottom:3px;
}

/* ===== MODAL / DIALOG ===== */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--panel);border:1px solid var(--border-hot);
  max-width:680px;width:100%;max-height:90vh;overflow-y:auto;
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.modal-header{
  padding:20px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-family:var(--f-display);font-weight:700;font-size:18px;letter-spacing:.15em;text-transform:uppercase}
.modal-close{font-family:var(--f-tech);font-size:14px;color:var(--dim);padding:4px 8px;border:1px solid var(--border)}
.modal-close:hover{color:var(--text);border-color:var(--accent)}
.modal-body{padding:20px 28px;font-family:var(--f-body);font-size:15px;line-height:1.6;color:var(--dim)}
.modal-body h3{color:var(--accent);margin:16px 0 8px;font-size:14px;letter-spacing:.2em}
.modal-body h3:first-child{margin-top:0}
.modal-body p{margin-bottom:8px}
.modal-body ul{padding-left:20px;margin-bottom:8px}
.modal-body li{margin-bottom:4px}
.modal-body strong{color:var(--text)}
.modal-body code{font-family:var(--f-tech);font-size:12px;color:var(--accent2);background:rgba(0,212,255,.1);padding:1px 5px}
.modal-footer{padding:16px 28px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:12px}

.end-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:30px;text-align:center;
}
.end-title{
  font-family:var(--f-display);font-weight:900;font-size:clamp(40px,6vw,80px);
  letter-spacing:-.02em;
}
.end-title.win{
  background:linear-gradient(180deg,#fff,var(--success));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 60px rgba(0,255,136,.3);
}
.end-title.lose{
  background:linear-gradient(180deg,#fff,var(--danger));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 60px rgba(255,58,58,.3);
}
.end-sub{font-family:var(--f-tech);color:var(--dim);letter-spacing:.3em;font-size:13px}

/* ===== TOAST ===== */
#toast-layer{
  position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
  z-index:2000;display:flex;flex-direction:column;gap:10px;align-items:center;
  pointer-events:none;width:100%;max-width:600px;padding:0 20px;
}
.toast{
  font-family:var(--f-display);font-weight:700;font-size:18px;letter-spacing:.15em;
  padding:18px 36px;background:var(--panel);border:2px solid var(--border-hot);
  color:var(--text);animation:toast-pop .3s ease-out;text-align:center;
  text-transform:uppercase;max-width:100%;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  box-shadow:0 10px 40px rgba(0,0,0,.7);
}
.toast.warn{border-color:var(--accent);color:var(--accent);box-shadow:0 0 40px rgba(255,167,38,.4),0 10px 40px rgba(0,0,0,.7)}
.toast.bad{border-color:var(--danger);color:var(--danger);box-shadow:0 0 40px rgba(255,58,58,.5),0 10px 40px rgba(0,0,0,.7)}
.toast.good{border-color:var(--success);color:var(--success);box-shadow:0 0 40px rgba(0,255,136,.4),0 10px 40px rgba(0,0,0,.7)}

/* ===== ANIMATIONS ===== */
@keyframes toast-pop{0%{opacity:0;transform:scale(.6)}60%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(255,58,58,.4)}50%{box-shadow:0 0 0 6px rgba(255,58,58,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes draw-in{from{opacity:0;transform:translateY(30px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.card.new{animation:draw-in .3s ease-out}
@keyframes flash{0%,100%{background:transparent}50%{background:rgba(255,255,255,.1)}}
.flash{animation:flash .3s}

/* ===== FX LAYER & ANIMATIONEN ===== */
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:1500}
#modal-layer{position:fixed;inset:0;z-index:2000;pointer-events:none}
#modal-layer:empty{display:none}
#modal-layer > *{pointer-events:auto}
.float-text{
  position:fixed;font-family:var(--f-display);font-weight:900;font-size:30px;
  letter-spacing:.04em;transform:translate(-50%,-50%);
  animation:float-up 1.1s ease-out forwards;
  text-shadow:2px 2px 0 #000,0 0 20px currentColor;
  pointer-events:none;white-space:nowrap;
}
.float-text.damage{color:var(--danger)}
.float-text.heal{color:var(--success)}
.float-text.shield{color:var(--shield);font-size:22px}
.float-text.thorns{color:var(--thorn);font-size:24px}
.float-text.energy{color:var(--accent);font-size:22px}
.float-text.small{font-size:20px}
@keyframes float-up{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  15%{opacity:1;transform:translate(-50%,-90%) scale(1.35)}
  40%{transform:translate(-50%,-120%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-200%) scale(.9)}
}

/* Card animations */
@keyframes lunge{
  0%{transform:translateY(0) scale(1)}
  35%{transform:translateY(-24px) scale(1.1);filter:brightness(1.4)}
  70%{transform:translateY(4px) scale(.95);filter:brightness(.85)}
  100%{transform:translateY(0) scale(1);filter:brightness(1)}
}
.card.attacking{animation:lunge .45s ease-in-out;z-index:55}

@keyframes dmg-shake{
  0%,100%{transform:translateX(0);filter:none}
  12%{transform:translateX(-7px) translateY(-2px);filter:brightness(1.8) hue-rotate(-20deg)}
  24%{transform:translateX(7px) translateY(1px);filter:brightness(1.8)}
  38%{transform:translateX(-4px);filter:brightness(1.3)}
  52%{transform:translateX(4px)}
  70%{transform:translateX(-2px)}
}
.card.damaged{animation:dmg-shake .5s}

@keyframes destroy-fade{
  0%{opacity:1;transform:scale(1) rotate(0);filter:brightness(1)}
  25%{opacity:1;transform:scale(1.12) rotate(-3deg);filter:brightness(2) saturate(1.5)}
  100%{opacity:0;transform:scale(.35) rotate(18deg);filter:brightness(.2) saturate(0) blur(3px)}
}
.card.destroyed{animation:destroy-fade .55s ease-in forwards;pointer-events:none}

@keyframes summon-in{
  0%{opacity:0;transform:translateY(40px) scale(.4) rotate(-8deg);filter:brightness(2)}
  60%{opacity:1;transform:translateY(-4px) scale(1.06) rotate(2deg);filter:brightness(1.3)}
  100%{opacity:1;transform:translateY(0) scale(1) rotate(0);filter:brightness(1)}
}
.card.summoned-in{animation:summon-in .5s ease-out}

@keyframes heal-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.5)}
  50%{box-shadow:0 0 30px 8px rgba(0,255,136,.7);filter:brightness(1.2)}
}
.card.healing{animation:heal-pulse .7s}

@keyframes shield-absorb{
  0%,100%{box-shadow:0 0 0 0 rgba(109,200,255,.5)}
  30%{box-shadow:0 0 35px 12px rgba(109,200,255,.9);border-color:#fff}
  70%{box-shadow:0 0 20px 6px rgba(109,200,255,.5)}
}
.card.shield-flash{animation:shield-absorb .6s}

@keyframes thorns-flash{
  0%,100%{box-shadow:0 0 0 0 rgba(184,109,255,.5)}
  40%{box-shadow:0 0 25px 8px rgba(184,109,255,.8)}
}
.card.thorns-flash{animation:thorns-flash .5s}

@keyframes draw-slide{
  0%{opacity:0;transform:translateY(30px) scale(.7)}
  60%{opacity:1;transform:translateY(-4px) scale(1.04)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.card.drawn{animation:draw-slide .4s ease-out}

@keyframes turn-flash{
  0%,100%{box-shadow:0 0 0 0 var(--accent)}
  50%{box-shadow:0 0 60px 20px rgba(255,167,38,.4)}
}
.turn-indicator.flash{animation:turn-flash .8s}

/* Screen flash on big events */
@keyframes screen-flash-red{0%,100%{background:transparent}50%{background:rgba(255,58,58,.18)}}
@keyframes screen-flash-green{0%,100%{background:transparent}50%{background:rgba(0,255,136,.15)}}
.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:1800}
.screen-flash.red{animation:screen-flash-red .4s}
.screen-flash.green{animation:screen-flash-green .4s}

/* Sound toggle button */
.sound-toggle{
  position:fixed;top:12px;right:12px;z-index:100;
  width:42px;height:42px;background:var(--panel);border:1px solid var(--border);
  color:var(--dim);font-size:18px;font-family:var(--f-tech);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
}
.sound-toggle:hover{border-color:var(--accent);color:var(--accent)}
.sound-toggle.on{color:var(--accent2);border-color:var(--accent2)}
.sound-toggle.off{color:var(--dim);opacity:.5;text-decoration:line-through}

/* ===== TUTORIAL ===== */
.tut-overlay{
  position:fixed;inset:0;z-index:3000;
  background:rgba(0,0,0,.7);backdrop-filter:blur(2px);
  pointer-events:auto;
}
.tut-spotlight{
  position:fixed;border:2px solid var(--accent);
  background:transparent;pointer-events:none;z-index:3001;
  box-shadow:0 0 0 9999px rgba(0,0,0,.7),0 0 30px rgba(255,167,38,.6);
  animation:tut-glow 1.5s ease-in-out infinite;
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
@keyframes tut-glow{
  0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.7),0 0 30px rgba(255,167,38,.5)}
  50%{box-shadow:0 0 0 9999px rgba(0,0,0,.7),0 0 50px rgba(255,167,38,.9)}
}
.tut-box{
  position:fixed;background:var(--panel);border:2px solid var(--accent);
  padding:22px 28px;max-width:420px;z-index:3002;
  box-shadow:0 20px 50px rgba(0,0,0,.8);
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
}
.tut-pos-center{top:50%;left:50%;transform:translate(-50%,-50%)}
.tut-pos-top{bottom:32vh;left:50%;transform:translateX(-50%)}
.tut-pos-bottom{top:12vh;left:50%;transform:translateX(-50%)}
.tut-pos-left{top:50%;right:30px;transform:translateY(-50%)}
.tut-step-counter{
  font-family:var(--f-tech);font-size:10px;color:var(--accent);
  letter-spacing:.3em;margin-bottom:4px;text-transform:uppercase;
}
.tut-title{
  font-family:var(--f-display);font-size:20px;color:var(--text);
  letter-spacing:.05em;margin-bottom:10px;
}
.tut-text{
  font-family:var(--f-body);font-size:14px;color:var(--dim);line-height:1.5;
  margin-bottom:18px;
}
.tut-buttons{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* ===== DECKBUILDER ===== */
.db-screen{height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.db-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:var(--panel);
}
.db-body{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden;min-height:0}
.db-pool{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);min-height:0}
.db-filter-bar{
  display:flex;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.2);flex-wrap:wrap;align-items:center;
}
.db-filter-bar input,.db-filter-bar select{
  font-family:var(--f-tech);font-size:12px;padding:6px 10px;
  background:var(--panel);color:var(--text);border:1px solid var(--border);
  outline:none;
}
.db-filter-bar input{flex:1;min-width:160px}
.db-filter-bar input:focus,.db-filter-bar select:focus{border-color:var(--accent)}
.db-pool-grid{
  flex:1;overflow-y:auto;padding:18px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;
  align-content:start;
}
.db-pool-card{position:relative;cursor:pointer;transition:transform .12s}
.db-pool-card:hover{transform:translateY(-3px)}
.db-pool-card.at-max{opacity:.5}
.db-pool-card.at-max:hover{transform:none;cursor:not-allowed}
.db-count-badge{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#000;font-family:var(--f-display);font-weight:900;
  font-size:13px;padding:3px 8px;z-index:10;border-radius:50%;
  box-shadow:0 0 12px rgba(255,167,38,.6);
  min-width:22px;text-align:center;
}

.db-deck-panel{display:flex;flex-direction:column;background:var(--panel);overflow:hidden;min-height:0}
.db-deck-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:14px 18px;
  border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);
}
.db-deck-stats .db-stat{
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--f-tech);font-size:11px;letter-spacing:.1em;
  padding:4px 8px;background:rgba(0,0,0,.3);border:1px solid var(--border);
}
.db-deck-stats .db-stat strong{font-family:var(--f-display);font-size:14px;font-weight:700}
.db-deck-stats .db-stat.ok{color:var(--success);border-color:var(--success)}
.db-deck-stats .db-stat.bad{color:var(--accent);border-color:var(--accent)}
.db-deck-hint{
  padding:10px 18px;font-family:var(--f-body);font-size:12px;color:var(--dim);
  border-bottom:1px solid var(--border);line-height:1.5;
}
.db-deck-hint strong{color:var(--text)}
.db-deck-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:4px}
.db-deck-row{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:rgba(0,0,0,.3);border-left:3px solid var(--border);
  font-family:var(--f-tech);font-size:12px;cursor:pointer;
  transition:background .12s,border-color .12s;
}
.db-deck-row:hover{background:rgba(255,58,58,.1);border-left-color:var(--danger)}
.db-deck-count{font-weight:700;min-width:30px}
.db-deck-cost{color:var(--accent);min-width:24px}
.db-deck-name{flex:1;color:var(--text);font-family:var(--f-body);font-size:13px}
.db-deck-remove{color:var(--danger);font-weight:900;font-size:18px;line-height:1}

/* ===== MOBILE/TABLET ===== */
@media (max-width:1100px){
  .card{width:130px;height:185px}
  .card.small{width:108px;height:152px}
  .card.mini{width:64px;height:90px}
  .hand{min-height:190px;padding:8px 14px}
  .player-zone{padding:8px 14px}
  .field-row{min-height:120px;gap:6px}
  .middle{padding:10px 14px;min-height:110px;gap:12px}
  .turn-indicator{font-size:15px;padding:8px 18px}
  .battle-log{font-size:11px;max-height:72px}
  .db-body{grid-template-columns:1fr 340px}
  .db-pool-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
}

/* ===== DESKTOP / LARGE SCREENS ===== */
/* Die Karten/Layout-Defaults sind für Smartphones im Querformat (~720x400) optimiert.
   Auf großen Desktop-Bildschirmen werden Karten und Spielfelder sonst riesig. */
@media (min-width:1101px){
  .card{width:120px;height:170px}
  .card.small{width:100px;height:142px}
  .card.mini{width:60px;height:84px}
  .hand{min-height:180px;padding:8px 14px}
  .field-row{min-height:120px;gap:6px}
  .field{min-height:240px;gap:6px}
}

@media (max-width:760px){
  /* Kompaktmodus fuer Handys */
  .card{width:100px;height:142px}
  .card.small{width:84px;height:118px}
  .card.mini{width:52px;height:74px}
  .card-art{height:56px}
  .card.small .card-art{height:46px}
  .card-name{font-size:10px;padding:3px 5px 1px;min-height:18px}
  .card.small .card-name{font-size:9px;min-height:16px}
  .card-ability{font-size:9px;padding:3px 5px;line-height:1.2}
  .card.small .card-ability{font-size:8px}
  .card-ability .ability-detail{font-size:8px}
  .card.small .card-ability .ability-detail{display:none}
  .card-stats{padding:3px 5px;font-size:10px}
  .card-cost{width:20px;height:20px;font-size:11px;top:4px;left:4px}
  .card-maker{font-size:7px;top:5px;right:5px;max-width:50px}
  
  .hand{min-height:150px;padding:6px 10px;gap:4px}
  .hand.opponent{min-height:44px}
  .player-zone{padding:4px 8px;gap:4px}
  .field{min-height:195px;gap:3px}
  .field-row{min-height:96px;gap:4px;padding:2px 0}
  .field-row.batteries{min-height:54px}
  .field-label{display:none}
  
  /* Middle-Panel: Vertikaler Stack auf schmalen Screens */
  .middle{
    padding:6px 8px;min-height:auto;gap:6px;
    grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;
    grid-template-areas:"left center right" "log log log";
  }
  .middle-left-col{grid-area:left;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-start;gap:4px}
  .middle-center{grid-area:center;gap:4px}
  .middle-right-col{grid-area:right;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:4px}
  .middle-center .battle-log{grid-area:log;width:100%}
  .middle-center .turn-indicator,.middle-center .attacker-info{align-self:center}
  .middle .btn{padding:6px 10px;font-size:10px;min-width:auto;letter-spacing:.1em}
  .middle-left-col .btn,.middle-right-col .btn{padding:6px 8px;font-size:9px}
  .turn-indicator{font-size:11px;padding:4px 10px;letter-spacing:.15em;min-width:auto}
  .battle-log{max-height:44px;font-size:10px;min-height:36px;padding:3px 6px;width:100%}
  .battle-log .entry{font-size:9px;line-height:1.2}
  .battle-log .entry:last-child{font-size:10px}
  .attacker-info{font-size:9px;padding:3px 6px}
  .end-turn{min-width:auto;padding:8px 12px!important;font-size:11px!important}
  
  .zone-header{font-size:10px;flex-wrap:wrap;gap:4px}
  .stat-pill{padding:3px 6px;font-size:10px}
  .stat-pill .label{font-size:8px}
  .stats-row{gap:6px;flex-wrap:wrap}
  
  /* Tooltip auf Mobile: kompakter Bottom-Sheet, tappable zum Schliessen */
  .card-tooltip{
    position:fixed!important;left:8px!important;right:8px!important;
    bottom:8px!important;top:auto!important;width:auto!important;max-width:none;
    max-height:40vh;overflow-y:auto;
    pointer-events:auto!important;
    z-index:2500;
  }
  .card-tooltip::after{
    content:'× Tap to close';display:block;text-align:center;
    font-family:var(--f-tech);font-size:10px;color:var(--dim);
    margin-top:8px;padding-top:6px;border-top:1px solid var(--border);
  }
  
  /* Sound-Toggle kleiner */
  .sound-toggle{width:32px;height:32px;font-size:13px;top:6px;right:6px}
  
  /* Deckbuilder: Spalten statt nebeneinander */
  .db-body{grid-template-columns:1fr;grid-template-rows:1fr auto;overflow:auto}
  .db-pool{border-right:none;border-bottom:1px solid var(--border)}
  .db-pool-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;padding:10px}
  .db-deck-panel{max-height:45vh}
  .db-topbar{padding:10px 14px;flex-wrap:wrap;gap:8px}
  .db-topbar h2{font-size:14px;flex:1;text-align:center}
  .db-filter-bar{gap:6px;padding:10px}
  .db-filter-bar input,.db-filter-bar select{font-size:11px;padding:5px 8px}
  .db-filter-bar select{flex:1;min-width:100px}
  
  /* Modals voll ausnutzen */
  .modal{max-width:100%;max-height:95vh}
  .modal-header{padding:14px 18px}
  .modal-title{font-size:15px}
  .modal-body{padding:14px 18px;font-size:13px}
  
  /* Title */

@media (max-width:480px){

  .stat-pill{padding:2px 5px;font-size:9px}
  .stats-row{gap:4px}
}

/* Landscape auf niedrigem Schirm (typisches Handy im Querformat) */
/* =============================================
   MOBILE LANDSCAPE — feste Hoehen, nichts blaeht sich auf
   ============================================= */
@media (max-height:500px) and (orientation:landscape), (max-width:900px) and (orientation:landscape){
  /* Board-Grid mit fixen Hoehen statt 1fr/auto/1fr */
  .board{
    display:grid;
    grid-template-rows:
      28px              /* Gegner-Header */
      minmax(85px,1fr)  /* Gegner-Feld (flex) */
      36px              /* Middle-Panel */
      minmax(85px,1fr)  /* Eigenes Feld (flex) */
      110px             /* Eigene Hand (fix!) */
      28px;             /* Eigener Header */
    grid-template-areas:
      "opp-header"
      "opp-field"
      "middle"
      "me-field"
      "me-hand"
      "me-header";
    overflow:hidden;
  }
  
  /* Beide Spielerzonen werden NICHT mehr als flex-direction:column verwendet.
     Stattdessen sind ihre Teile direkte Grid-Children */
  .player-zone{display:contents}
  .player-zone.opponent .zone-header{grid-area:opp-header;border-bottom:1px solid var(--border)}
  .player-zone.opponent .hand{display:none} /* Gegner-Hand auf Mobile nicht anzeigen, zu wenig Platz */
  .player-zone.opponent .field{grid-area:opp-field}
  .player-zone.me .field{grid-area:me-field}
  .player-zone.me .hand{grid-area:me-hand;border-top:1px solid var(--border)}
  .player-zone.me .zone-header{grid-area:me-header;border-top:1px solid var(--border)}
  .middle{grid-area:middle}
  
  /* Headers: kompakt */
  .zone-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:2px 10px;font-size:9px;letter-spacing:.15em;
    height:28px;overflow:hidden;
  }
  .zone-header .who{font-size:9px}
  .stats-row{gap:4px;flex-wrap:nowrap}
  .stat-pill{padding:1px 5px;font-size:9px;gap:3px}
  .stat-pill .label{font-size:8px}
  .stat-pill .value{font-size:10px}
  
  /* Felder: bekommen flex 1, Karten scrollen horizontal wenn nötig */
  .field{
    display:flex;flex-direction:column;gap:2px;
    padding:2px 6px;min-height:0;max-height:100%;overflow:hidden;
  }
  .field-row{
    display:flex;gap:3px;align-items:center;
    min-height:0;flex:1 1 auto;
    overflow-x:auto;overflow-y:hidden;
    padding:2px 0;
  }
  .field-row.batteries{flex:0 0 50px;max-height:50px}
  .field-row.robots{flex:1 1 auto}
  .field-label{display:none}
  
  /* Karten im Feld: mini */
  .field .card{
    width:62px;height:88px;flex-shrink:0;
  }
  .field .card .card-art{height:36px}
  .field .card .card-name{font-size:7px;min-height:12px;padding:1px 3px}
  .field .card .card-ability{display:none}
  .field .card .card-stats{padding:1px 3px;font-size:8px}
  .field .card .card-cost{width:14px;height:14px;font-size:8px;top:2px;left:2px}
  .field .card .card-maker{display:none}
  
  /* Batterien: etwas kleiner */
  .field-row.batteries .card{width:48px;height:48px}
  .field-row.batteries .card .card-art{height:24px}
  .field-row.batteries .card .card-name{font-size:6px;min-height:10px;line-height:1}
  .field-row.batteries .card .card-stats{font-size:7px}
  
  /* Hand: fixe Hoehe 110px, Karten groesser damit lesbar */
  .hand{
    height:110px;min-height:0;max-height:110px;
    display:flex;gap:4px;padding:4px 8px;align-items:flex-start;
    overflow-x:auto;overflow-y:hidden;
  }
  .hand .card{
    width:72px;height:102px;flex-shrink:0;
  }
  .hand .card .card-art{height:40px}
  .hand .card .card-name{font-size:8px;min-height:14px;padding:2px 3px}
  .hand .card .card-ability{font-size:7px;padding:2px 3px;line-height:1.1;max-height:24px;overflow:hidden}
  .hand .card .card-ability .ability-detail{display:none}
  .hand .card .card-stats{padding:2px 3px;font-size:8px}
  .hand .card .card-cost{width:16px;height:16px;font-size:9px;top:2px;left:2px}
  .hand .card .card-maker{display:none}
  
  /* Middle-Panel: eine Zeile, minimale Höhe */
  .middle{
    display:flex;flex-direction:row;align-items:center;
    padding:2px 8px;gap:6px;height:36px;min-height:36px;max-height:36px;
    overflow:hidden;
  }
  .middle-left-col,.middle-right-col,.middle-center{
    display:flex;flex-direction:row;align-items:center;gap:4px;min-width:0;
  }
  .middle-left-col{flex:0 0 auto}
  .middle-center{flex:1 1 auto;justify-content:center;min-width:0}
  .middle-right-col{flex:0 0 auto}
  .middle .btn{padding:4px 8px;font-size:9px;min-width:auto;letter-spacing:.1em}
  .middle-left-col .btn{padding:3px 6px;font-size:8px}
  .middle-left-col .btn:not(:first-child){display:none} /* Nur Menü-Button zeigen */
  .turn-indicator{font-size:9px;padding:3px 8px;letter-spacing:.1em;white-space:nowrap}
  .battle-log{
    max-height:28px;min-height:24px;font-size:8px;padding:2px 6px;
    line-height:1.1;overflow:hidden;text-align:center;
  }
  .battle-log .entry{font-size:8px}
  .battle-log .entry:not(:last-child){display:none} /* Nur letzte Log-Zeile */
  .battle-log .entry:last-child{font-size:9px}
  .attacker-info{font-size:8px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .end-turn{padding:4px 10px!important;font-size:9px!important;min-width:auto!important}
  
  /* Sound-Toggle */
  .sound-toggle{width:24px;height:24px;font-size:11px;top:3px;right:3px;z-index:200}
  
  /* Portrait-Hint ausblenden im Landscape */
  .portrait-hint{display:none!important}
}
@media (max-width:640px) and (orientation:portrait){
  .portrait-hint{
    display:block!important;
    position:fixed;top:50px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--accent);
    padding:6px 14px;font-family:var(--f-tech);font-size:10px;
    color:var(--accent);letter-spacing:.1em;z-index:150;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
    pointer-events:none;
  }
}
.portrait-hint{display:none}

/* Touch-optimized: laengere Verzoegerung fuer Hover-Effekte, bessere Tap-Feedback */
@media (hover:none){
  .card:hover{transform:none}
  .card:active{transform:scale(.96)}
  .db-pool-card:active{transform:scale(.94)}
  .btn:active{transform:scale(.96)}
}

.hidden{display:none!important}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

let audioCtx = null;
let soundEnabled = false;
try{ soundEnabled = localStorage.getItem('botduel-sound') === '1'; }catch(e){}
function initAudio(){
  if(!audioCtx && (window.AudioContext||window.webkitAudioContext)){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(audioCtx && audioCtx.state==='suspended'){ try{ audioCtx.resume(); }catch(e){} }
}
function tone(freq, dur=0.08, type='sine', vol=0.03, delay=0, slideTo=null){
  if(!soundEnabled || !audioCtx) return;
  try{
    const t = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if(slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t+dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    osc.start(t); osc.stop(t+dur);
  }catch(e){}
}
function noise(dur=0.06, vol=0.025, delay=0, filterHz=1500){
  if(!soundEnabled || !audioCtx) return;
  try{
    const t = audioCtx.currentTime + delay;
    const size = Math.floor(audioCtx.sampleRate*dur);
    const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<size;i++) data[i] = Math.random()*2-1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const filt = audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=filterHz;
    const gain = audioCtx.createGain();
    src.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    src.start(t);
  }catch(e){}
}
// Dezentere SFX: kürzer, leiser, charakteristischer voneinander abgesetzt
// Cooldown gegen Sound-Spam (gleicher Sound nicht öfter als alle X ms)
const _sfxLastPlayed = {};
function _sfxOk(name, cooldownMs=80){
  const now = Date.now();
  if(_sfxLastPlayed[name] && now - _sfxLastPlayed[name] < cooldownMs) return false;
  _sfxLastPlayed[name] = now;
  return true;
}

/* ---------- ANIMATION HELPER ---------- */
let lastRenderedUids = new Set();
function $card(uid){ return document.querySelector(`.card[data-uid="${uid}"]`); }
function animateCard(uid, cls, duration=500){
  const el = $card(uid);
  if(!el) return;
  // Klasse entfernen und gleich wieder setzen → Animation retriggern
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  setTimeout(()=>{ try{ el.classList.remove(cls); }catch(e){} }, duration+50);
}
function floatText(uid, text, kind='damage'){
  const el = $card(uid);
  if(!el) return;
  const r = el.getBoundingClientRect();
  spawnFloatText(r.left + r.width/2, r.top + r.height/2, text, kind);
}
function floatTextAtPlayer(side, text, kind='damage'){
  const el = document.querySelector(side==='me' ? '.player-zone.me .stats-row' : '.player-zone.opponent .stats-row');
  if(!el) return;
  const r = el.getBoundingClientRect();
  spawnFloatText(r.left + r.width/2, r.top + r.height/2, text, kind);
}
function spawnFloatText(x, y, text, kind){
  const layer = document.getElementById('fx-layer');
  if(!layer) return;
  const ft = document.createElement('div');
  ft.className = `float-text ${kind}`;
  ft.textContent = text;
  ft.style.left = x+'px';
  ft.style.top = y+'px';
  layer.appendChild(ft);
  setTimeout(()=>{ try{ ft.remove(); }catch(e){} }, 1200);
}
function screenFlash(kind='red'){
  const el = document.createElement('div');
  el.className = `screen-flash ${kind}`;
  document.body.appendChild(el);
  setTimeout(()=>{ try{ el.remove(); }catch(e){} }, 400);
}
// Nach jedem Render: neu erschienene Karten mit summon-Animation versehen
function postRenderFx(){
  const current = new Set();
  document.querySelectorAll('.card[data-uid]').forEach(el=>{
    const uid = el.dataset.uid;
    current.add(uid);
    // Nur auf dem Feld und in der Hand, nicht für untargetable/dimmed fresh
    if(!lastRenderedUids.has(uid) && !el.classList.contains('back')){
      const ctx = el.dataset.context;
      if(ctx === 'my-field' || ctx === 'my-batt' || ctx === 'ai-field' || ctx === 'ai-batt'){
        el.classList.add('summoned-in');
        setTimeout(()=>{try{ el.classList.remove('summoned-in'); }catch(e){}}, 550);
      }
    }
  });
  lastRenderedUids = current;
}
// Reset bei Screen-Wechsel (sonst alles wird beim ersten Spiel-Render summoned)
function resetRenderTracking(){ lastRenderedUids = new Set(); }
