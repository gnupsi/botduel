/* ---------- DECKBUILDER UI ---------- */
let dbState = null;
function openDeckbuilder(){
  // Lade existierenden Custom-Deck oder starte leer
  const loaded = loadCustomDeck();
  dbState = {
    spec: loaded ? [...loaded] : [],
    filterType: 'all',     // all/robot/battery/module
    filterSearch: '',
    filterMaker: 'all',    // all + Hersteller
    filterArche: 'all',    // all + Archetypen
    sortBy: 'cost'         // cost/name/atk
  };
  renderDeckbuilder();
}

function dbAddCard(cardId){
  const existing = dbState.spec.find(e=>e.cardId===cardId);
  const totalNow = dbState.spec.reduce((s,e)=>s+e.count,0);
  if(totalNow >= TARGET_DECK_SIZE){ toast(`Deck full (${TARGET_DECK_SIZE} cards)`,'warn'); return; }
  if(existing){
    if(existing.count >= MAX_COPIES_PER_CARD){ toast(`Max ${MAX_COPIES_PER_CARD} copies allowed`,'warn'); return; }
    existing.count++;
  } else {
    dbState.spec.push({cardId, count:1});
  }
  renderDeckbuilder();
}
function dbRemoveCard(cardId){
  const idx = dbState.spec.findIndex(e=>e.cardId===cardId);
  if(idx<0) return;
  dbState.spec[idx].count--;
  if(dbState.spec[idx].count<=0) dbState.spec.splice(idx,1);
  renderDeckbuilder();
}
function dbSaveAndExit(){
  const total = dbState.spec.reduce((s,e)=>s+e.count,0);
  if(total !== TARGET_DECK_SIZE){
    toast(`Deck needs exactly ${TARGET_DECK_SIZE} cards (currently ${total})`,'bad');
    return;
  }
  if(saveCustomDeck(dbState.spec)){
    toast('Deck saved!','good');
    state.screen = 'title';
    renderTitle();
  } else {
    toast('Save failed','bad');
  }
}
function dbBackToTitle(){
  state.screen = 'title';
  renderTitle();
}
function dbClearAll(){
  if(!confirm('Really clear entire deck?')) return;
  dbState.spec = [];
  renderDeckbuilder();
}
function dbAutoFill(){
  // Fülle aktuell selektierte Karten + Zufalls-Karten bis 30
  let total = dbState.spec.reduce((s,e)=>s+e.count,0);
  const ROBOTS_pool = ROBOTS.filter(r=>!dbState.spec.find(e=>e.cardId===r.id) || dbState.spec.find(e=>e.cardId===r.id).count<MAX_COPIES_PER_CARD);
  const BATTERIES_pool = BATTERIES.filter(b=>!dbState.spec.find(e=>e.cardId===b.id) || dbState.spec.find(e=>e.cardId===b.id).count<MAX_COPIES_PER_CARD);
  const MODULES_pool = MODULES.filter(m=>!dbState.spec.find(e=>e.cardId===m.id) || dbState.spec.find(e=>e.cardId===m.id).count<MAX_COPIES_PER_CARD);
  // Verhältnis: 16 Roboter, 9 Batterien, 5 Module — bereits vorhandene berücksichtigen
  const counts = countByType(dbState.spec);
  const need = {robot: Math.max(0, 16-counts.robot), battery: Math.max(0, 9-counts.battery), module: Math.max(0, 5-counts.module)};
  
  let safety = 100;
  while(total < TARGET_DECK_SIZE && safety-- > 0){
    let pool = need.robot > 0 ? ROBOTS_pool : (need.battery > 0 ? BATTERIES_pool : MODULES_pool);
    if(!pool.length) pool = [...ROBOTS_pool, ...BATTERIES_pool, ...MODULES_pool];
    if(!pool.length) break;
    const card = pool[Math.floor(Math.random()*pool.length)];
    const existing = dbState.spec.find(e=>e.cardId===card.id);
    if(existing && existing.count >= MAX_COPIES_PER_CARD) continue;
    if(existing) existing.count++; else dbState.spec.push({cardId:card.id, count:1});
    if(card.type==='robot' && need.robot>0) need.robot--;
    else if(card.type==='battery' && need.battery>0) need.battery--;
    else if(card.type==='module' && need.module>0) need.module--;
    total++;
  }
  renderDeckbuilder();
}
let _dbSearchTimer = null;
let _dbSearchFocusPos = -1;
function dbSetFilter(field, value){
  if(!dbState) return;
  dbState[field] = value;
  if(field === 'filterSearch'){
    // Debounce: rendere erst nach kurzer Pause
    if(_dbSearchTimer) clearTimeout(_dbSearchTimer);
    _dbSearchFocusPos = value.length;
    _dbSearchTimer = setTimeout(()=>{
      renderDeckbuilder();
      // Fokus auf Suchfeld wiederherstellen
      const inp = document.querySelector('.db-filter-bar input[type="text"]');
      if(inp){
        inp.focus();
        try{ inp.setSelectionRange(_dbSearchFocusPos, _dbSearchFocusPos); }catch(e){}
      }
    }, 180);
  } else {
    renderDeckbuilder();
  }
}
function countByType(spec){
  const counts = {robot:0, battery:0, module:0};
  spec.forEach(e=>{
    const c = CARD_INDEX[e.cardId];
    if(c) counts[c.type] = (counts[c.type]||0) + e.count;
  });
  return counts;
}

function renderDeckbuilder(){
  const allCards = [...ROBOTS, ...BATTERIES, ...MODULES];
  // Hersteller- und Archetyp-Listen extrahieren
  const makers = [...new Set(ROBOTS.map(r=>r.maker))].sort();
  const arches = [...new Set(ROBOTS.map(r=>r.arche))].sort();
  
  // Filter anwenden
  let filtered = allCards.filter(c=>{
    if(dbState.filterType !== 'all' && c.type !== dbState.filterType) return false;
    if(dbState.filterSearch && !c.name.toLowerCase().includes(dbState.filterSearch.toLowerCase()) && !((c.maker||'').toLowerCase().includes(dbState.filterSearch.toLowerCase()))) return false;
    if(dbState.filterMaker !== 'all' && c.maker !== dbState.filterMaker) return false;
    if(dbState.filterArche !== 'all' && c.arche !== dbState.filterArche) return false;
    return true;
  });
  // Sortieren
  filtered.sort((a,b)=>{
    if(dbState.sortBy === 'cost') return (a.cost||0) - (b.cost||0) || a.name.localeCompare(b.name);
    if(dbState.sortBy === 'name') return a.name.localeCompare(b.name);
    if(dbState.sortBy === 'atk') return ((b.atk||0) - (a.atk||0)) || a.name.localeCompare(b.name);
    return 0;
  });
  
  const counts = countByType(dbState.spec);
  const total = counts.robot + counts.battery + counts.module;
  const valid = total === TARGET_DECK_SIZE;
  
  // Karten-Pool als Mini-Karten rendern
  const poolHtml = filtered.map(card=>{
    const inDeck = dbState.spec.find(e=>e.cardId===card.id);
    const count = inDeck ? inDeck.count : 0;
    const atMax = count >= MAX_COPIES_PER_CARD;
    return `<div class="db-pool-card ${atMax?'at-max':''}" data-cardid="${card.id}" onclick="dbAddCard('${card.id}')">
      ${count>0 ? `<div class="db-count-badge">×${count}</div>` : ''}
      ${renderCardHtml(card,{context:'db-pool',extraCls:'small'})}
    </div>`;
  }).join('');
  
  // Deckliste rechts
  const deckEntries = dbState.spec.map(entry=>{
    const c = CARD_INDEX[entry.cardId];
    if(!c) return '';
    const typeColor = c.type==='robot'?'var(--accent2)':(c.type==='battery'?'var(--accent)':'var(--accent3)');
    return `<div class="db-deck-row" onclick="dbRemoveCard('${entry.cardId}')">
      <span class="db-deck-count" style="color:${typeColor}">×${entry.count}</span>
      <span class="db-deck-cost">${c.cost!==undefined?c.cost+'⚡':''}</span>
      <span class="db-deck-name">${c.name}</span>
      <span class="db-deck-remove">−</span>
    </div>`;
  }).join('');
  
  document.getElementById('app').innerHTML = `
    <div class="db-screen">
      <div class="db-topbar">
        <button class="btn btn-ghost" onclick="dbBackToTitle()">← BACK</button>
        <h2 style="font-family:var(--f-display);font-size:18px;letter-spacing:.2em">DECK BUILDER</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="dbClearAll()" style="padding:8px 14px;font-size:11px">CLEAR</button>
          <button class="btn btn-ghost" onclick="dbAutoFill()" style="padding:8px 14px;font-size:11px">AUTO-FILL</button>
          <button class="btn ${valid?'btn-primary':'btn-ghost'}" onclick="dbSaveAndExit()" style="padding:8px 14px;font-size:11px">${valid?'SAVE ✓':`SAVE (${total}/${TARGET_DECK_SIZE})`}</button>
        </div>
      </div>
      <div class="db-body">
        <div class="db-pool">
          <div class="db-filter-bar">
            <input type="text" placeholder="Search name/maker ..." value="${dbState.filterSearch}" oninput="dbSetFilter('filterSearch', this.value)">
            <select onchange="dbSetFilter('filterType', this.value)">
              <option value="all" ${dbState.filterType==='all'?'selected':''}>All Types</option>
              <option value="robot" ${dbState.filterType==='robot'?'selected':''}>Robots</option>
              <option value="battery" ${dbState.filterType==='battery'?'selected':''}>Batteries</option>
              <option value="module" ${dbState.filterType==='module'?'selected':''}>Modules</option>
            </select>
            <select onchange="dbSetFilter('filterMaker', this.value)">
              <option value="all">All Makers</option>
              ${makers.map(m=>`<option value="${m}" ${dbState.filterMaker===m?'selected':''}>${m}</option>`).join('')}
            </select>
            <select onchange="dbSetFilter('filterArche', this.value)">
              <option value="all">All Archetypes</option>
              ${arches.map(a=>`<option value="${a}" ${dbState.filterArche===a?'selected':''}>${a.replace('_',' ')}</option>`).join('')}
            </select>
            <select onchange="dbSetFilter('sortBy', this.value)">
              <option value="cost" ${dbState.sortBy==='cost'?'selected':''}>Sort: Cost</option>
              <option value="name" ${dbState.sortBy==='name'?'selected':''}>Sort: Name</option>
              <option value="atk" ${dbState.sortBy==='atk'?'selected':''}>Sort: ATK</option>
            </select>
          </div>
          <div class="db-pool-grid">
            ${poolHtml || '<div style="color:var(--dim);padding:40px;text-align:center;width:100%">No cards found</div>'}
          </div>
        </div>
        <div class="db-deck-panel">
          <div class="db-deck-stats">
            <div class="db-stat" style="color:var(--accent2)"><span>ROBOTS</span><strong>${counts.robot}</strong></div>
            <div class="db-stat" style="color:var(--accent)"><span>BATTERIES</span><strong>${counts.battery}</strong></div>
            <div class="db-stat" style="color:var(--accent3)"><span>MODULES</span><strong>${counts.module}</strong></div>
            <div class="db-stat ${valid?'ok':'bad'}"><span>TOTAL</span><strong>${total}/${TARGET_DECK_SIZE}</strong></div>
          </div>
          <div class="db-deck-hint">
            <strong>Tip:</strong> 16 robots / 9 batteries / 5 modules is a good starting balance. Tap a card in the pool to add it, tap on the right to remove. Max ${MAX_COPIES_PER_CARD} copies per card.
          </div>
          <div class="db-deck-list">
            ${deckEntries || '<div style="color:var(--dim);padding:20px;text-align:center">No cards yet<br>Tap a card on the left to add</div>'}
          </div>
        </div>
      </div>
    </div>
  `;
  // Tooltip-Handler aktivieren auch im Deckbuilder
  attachTooltipHandlers();
}

function renderEnd(){
  const win = state.gameOver === 'win';
  document.getElementById('app').innerHTML = `
    <div class="end-screen">
      <div class="end-sub">${win?'// MATCH RESULT':'// SYSTEM FAILURE'}</div>
      <h1 class="end-title ${win?'win':'lose'}">${win?'VICTORY':'DEFEAT'}</h1>
      <div class="end-sub">Turn ${state.turnNumber} · You: ${state.players.me.hp} HP · AI: ${state.players.ai.hp} HP</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startGame()">REMATCH</button>
        <button class="btn btn-ghost" onclick="state.screen='title';render()">BACK</button>
      </div>
    </div>
  `;
}

// === PWA: Inline-Service-Worker fuer Offline-Support ===
// Da single-file: Service-Worker als Blob registrieren
if('serviceWorker' in navigator){
  try {
    const swCode = `
const CACHE = 'botduel-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  // Network-first für HTML, Cache-first für alles andere
  const url = new URL(e.request.url);
  if(e.request.mode === 'navigate'){
    e.respondWith(
      fetch(e.request).then(res => {
        const copy = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, copy));
        return res;
      }).catch(() => caches.match(e.request).then(r => r || caches.match('/')))
    );
    return;
  }
  e.respondWith(
    caches.match(e.request).then(cached => {
      return cached || fetch(e.request).then(res => {
        if(res.ok && (url.protocol === 'http:' || url.protocol === 'https:')){
          const copy = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, copy));
        }
        return res;
      }).catch(() => cached);
    })
  );
});
`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    // SW braucht denselben origin — bei file:// funktioniert das nicht, daher try/catch
    navigator.serviceWorker.register(swUrl).catch(()=>{
      // Stille Schlucken — file:// oder andere Restriktionen
    });
  } catch(e){ /* ignorieren */ }
}

// Sound-Toggle-Button
function updateSoundToggleUI(){
  const btn = document.getElementById('sound-toggle');
  if(!btn) return;
  btn.textContent = soundEnabled ? '♪' : '♪̸';
  btn.classList.toggle('on', soundEnabled);
  btn.classList.toggle('off', !soundEnabled);
  btn.title = soundEnabled ? 'Sound an (klick zum Stummschalten)' : 'Sound aus (klick zum Aktivieren)';
}
document.getElementById('sound-toggle')?.addEventListener('click',()=>{
  soundEnabled = !soundEnabled;
  try{ localStorage.setItem('botduel-sound', soundEnabled?'1':'0'); }catch(e){}
  updateSoundToggleUI();
  if(soundEnabled){ initAudio(); SFX.draw(); }
});
updateSoundToggleUI();

// AudioContext muss durch eine User-Interaktion initialisiert werden (Browser-Policy).
// Erster Klick irgendwo erweckt den Kontext.
document.addEventListener('click', ()=>{ initAudio(); }, {once:false});

// ESC schließt Modals
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const layer = document.getElementById('modal-layer');
    if(layer && layer.innerHTML){ layer.innerHTML = ''; return; }
    const m = document.querySelector('.modal-bg');
    if(m) m.remove();
    if(state.pendingModule){state.pendingModule=null;render();}
    if(state.selected){state.selected=null;render();}
  }
});

</script>
